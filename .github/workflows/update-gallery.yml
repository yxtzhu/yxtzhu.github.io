name: Update Gallery

# Triggers when image files are added/removed/renamed in /pottery/
on:
  push:
    branches: [master]
    paths:
      - 'pottery/**'

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate _data/gallery.yml from pottery/ images
        run: |
          python3 - <<'EOF'
          import os, re, textwrap, yaml

          pottery_dir = 'pottery'
          output_file = '_data/gallery.yml'
          image_exts  = {'.jpg', '.jpeg', '.png', '.gif', '.webp'}

          entries = []
          for fname in sorted(os.listdir(pottery_dir)):
              if not os.path.isfile(os.path.join(pottery_dir, fname)):
                  continue
              stem, ext = os.path.splitext(fname)
              if ext.lower() not in image_exts:
                  continue

              # Naming convention: title--material.jpg
              # e.g. quiet-morning--stoneware-ash-glaze.jpg
              if '--' in stem:
                  title_raw, material_raw = stem.split('--', 1)
              else:
                  title_raw, material_raw = stem, ''

              title    = re.sub(r'[-_]+', ' ', title_raw).strip().title()
              material = re.sub(r'[-_]+', ' ', material_raw).strip().title()

              entries.append({'title': title, 'material': material, 'img': f'pottery/{fname}'})

          header = textwrap.dedent("""\
              # Auto-generated by GitHub Actions — do not edit by hand.
              # To add images: upload files to /pottery/ via the GitHub web UI.
              #
              # File naming convention:
              #   title.jpg                          →  title only
              #   title--clay-type-glaze.jpg         →  title + material
              #
              # Examples:
              #   quiet-morning.jpg
              #   river-stone-bowl--porcelain-celadon-glaze.jpg
              #
          """)

          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(header)
              yaml.dump(entries, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          print(f"Generated {output_file} with {len(entries)} image(s).")
          EOF

      - name: Commit updated gallery.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/gallery.yml
          if git diff --staged --quiet; then
            echo "No changes to gallery.yml — skipping commit."
          else
            git commit -m "chore: auto-update gallery from pottery/ images [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
