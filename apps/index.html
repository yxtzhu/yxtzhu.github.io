<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Apps">
  <meta name="theme-color" content="#000000">
  <title>Apps</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --bg: #000000;
      --surface: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --accent: #0a84ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Full bleed background that extends into notch/home indicator */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(10, 132, 255, 0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(94, 92, 230, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: calc(var(--safe-top) + 20px);
      padding-bottom: calc(var(--safe-bottom) + 32px);
      padding-left: calc(var(--safe-left) + 20px);
      padding-right: calc(var(--safe-right) + 20px);
    }

    header {
      padding: 16px 0 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .header-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1;
      padding-bottom: 3px;
    }

    /* App grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px 16px;
      flex: 1;
    }

    @media (min-width: 428px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 28px 20px;
      }
      .header-title {
        font-size: 42px;
      }
    }

    /* App card */
    .app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .app-icon-wrap {
      position: relative;
      width: 76px;
      height: 76px;
    }

    .app-icon {
      width: 76px;
      height: 76px;
      border-radius: 17px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      line-height: 1;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5),
                  0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform;
    }

    .app-icon img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .app-card:active .app-icon {
      transform: scale(0.88);
      transition: transform 0.06s ease;
    }

    .app-name {
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.3;
      max-width: 76px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 56px;
      line-height: 1;
      filter: grayscale(0.3);
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
    }

    .empty-body {
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
      max-width: 240px;
      color: rgba(255, 255, 255, 0.25);
    }

    /* Divider between sections */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 28px 0 16px;
      grid-column: 1 / -1;
    }

    /* Install hint */
    .install-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      padding-top: 32px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .standalone .install-hint {
      display: none;
    }

    .install-hint svg {
      flex-shrink: 0;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div>
        <div class="header-title">Apps</div>
      </div>
      <div class="header-subtitle" id="app-count"></div>
    </header>

    <div class="grid" id="grid"></div>

    <div class="install-hint" id="install-hint">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v6M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Safari → Share → Add to Home Screen for full screen mode
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // APPS REGISTRY
    // Add entries here when creating new apps.
    // See CLAUDE.md for full instructions on adding new apps.
    // ─────────────────────────────────────────────────────────────
    const APPS = [
      {
        id: "coin-flip",
        name: "Coin Flip",
        icon: "🪙",
        color: "linear-gradient(135deg, #f5c842 0%, #a87820 100%)",
        path: "./coin-flip/",
      },
      // Example entry (uncomment and edit to add an app):
      // {
      //   id: "my-app",                 // matches the subdirectory name
      //   name: "My App",               // display label under icon
      //   icon: "🎯",                   // emoji displayed on the icon tile
      //   color: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", // tile gradient
      //   path: "./my-app/",            // relative path to the app
      //   // iconImage: "./my-app/icon.png"  // optional: image instead of emoji
      // },
    ];

    // ─────────────────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────────────────
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('app-count');

    function renderApps() {
      grid.innerHTML = '';

      if (APPS.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚡</div>
            <div class="empty-title">No apps yet</div>
            <div class="empty-body">Add your first app — see CLAUDE.md for instructions</div>
          </div>
        `;
        return;
      }

      countEl.textContent = APPS.length === 1 ? '1 app' : `${APPS.length} apps`;

      APPS.forEach(app => {
        const a = document.createElement('a');
        a.className = 'app-card';
        a.href = app.path;

        const iconContent = app.iconImage
          ? `<img src="${app.iconImage}" width="44" height="44" alt="">`
          : app.icon;

        a.innerHTML = `
          <div class="app-icon-wrap">
            <div class="app-icon" style="background: ${app.color}">${iconContent}</div>
          </div>
          <span class="app-name">${app.name}</span>
        `;

        grid.appendChild(a);
      });
    }

    renderApps();

    // ─────────────────────────────────────────────────────────────
    // STANDALONE MODE DETECTION
    // ─────────────────────────────────────────────────────────────
    const isStandalone =
      window.navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches;

    if (isStandalone) {
      document.body.classList.add('standalone');
    }

    // ─────────────────────────────────────────────────────────────
    // SERVICE WORKER
    // ─────────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
