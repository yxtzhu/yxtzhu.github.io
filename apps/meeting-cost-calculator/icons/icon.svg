<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
  </defs>
  <!-- Background tile -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Dollar sign -->
  <text x="50" y="66" text-anchor="middle" font-size="58" font-family="'IBM Plex Mono', 'SF Mono', monospace" font-weight="600" fill="url(#flame)">$</text>
  <!-- Small flame accent dots -->
  <circle cx="72" cy="24" r="4" fill="#ff6b35" opacity="0.7"/>
  <circle cx="80" cy="32" r="2.5" fill="#ffd200" opacity="0.5"/>
  <circle cx="66" cy="18" r="2" fill="#ff6b35" opacity="0.4"/>
</svg>
