<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life Perspective">
  <meta name="theme-color" content="#1c1a17">
  <title>Life Perspective</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Libre+Franklin:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1a17;
      --text: #e8e0d4;
      --soft: #d4cabb;
      --muted: #8a7e72;
      --dim: #5e564c;
      --accent: #c4956a;
      --green: #8ab87e;
      --red: #c47a6a;
      --font-display: 'Cormorant Garamond', 'Garamond', serif;
      --font-body: 'Libre Franklin', 'Helvetica Neue', sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; background: var(--bg); }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 60px) calc(var(--safe-left) + 24px) calc(var(--safe-bottom) + 100px) calc(var(--safe-right) + 24px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.5s ease both; }

    /* Back nav */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      font-size: 0.78rem;
      font-family: var(--font-body);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--muted); }

    /* Section tag */
    .section-tag {
      font-family: var(--font-display);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Section divider */
    .section-block {
      margin-bottom: 80px;
      padding-bottom: 60px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .section-block:last-of-type { border-bottom: none; }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }

    .form-label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .form-label em {
      font-style: italic;
      text-transform: none;
      letter-spacing: 0;
    }

    .form-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font-display);
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: rgba(196,149,106,0.3); }
    .form-input option { background: var(--bg); }

    .sex-group { display: flex; gap: 8px; }
    .sex-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 0.78rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sex-btn.active {
      border-color: var(--accent);
      background: rgba(196,149,106,0.08);
      color: var(--accent);
    }

    .start-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.85rem;
      font-family: var(--font-body);
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: all 0.3s;
      cursor: default;
      background: rgba(255,255,255,0.05);
      color: var(--dim);
    }
    .start-btn.ready {
      background: var(--accent);
      color: var(--bg);
      cursor: pointer;
    }

    /* ── Big number ── */
    .big-num {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .big-sub {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 32px;
    }

    /* ── Dot grid ── */
    .dot-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 10px;
      max-width: 460px;
    }
    .dot {
      width: 5.5px;
      height: 5.5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-lived { background: #5a5248; }
    .dot-next  { background: #c4956a; }
    .dot-future { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }

    .dot-legend {
      font-size: 0.6rem;
      font-family: var(--font-body);
      color: var(--dim);
      font-weight: 300;
      margin-bottom: 48px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .dot-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Stat list ── */
    .stat-list { display: flex; flex-direction: column; gap: 14px; }
    .stat-item {
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }
    .stat-val-accent { color: var(--accent); font-weight: 500; }
    .stat-val-soft   { color: var(--soft);   font-weight: 500; }

    .section-heading {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--soft);
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* ── What If ── */
    .whatif-title {
      font-family: var(--font-display);
      font-size: clamp(1.15rem, 3.5vw, 1.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .whatif-sub {
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--dim);
      margin-bottom: 36px;
      font-weight: 300;
    }

    .whatif-big {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }
    .whatif-age {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 4.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }
    .whatif-label {
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
    }
    .whatif-delta {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      transition: color 0.3s;
    }
    .whatif-delta.pos { color: var(--green); }
    .whatif-delta.neg { color: var(--red); }
    .whatif-delta.neu { color: var(--muted); }

    /* Life bar */
    .life-bar-wrap {
      width: 100%;
      height: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 6px;
      position: relative;
    }
    .life-bar-lived {
      position: absolute; left: 0; top: 0; height: 100%;
      background: linear-gradient(90deg, #3a3530, #5a5248);
      border-radius: 8px 0 0 8px;
      transition: width 0.5s ease;
      z-index: 2;
    }
    .life-bar-remain {
      position: absolute; top: 0; height: 100%;
      transition: all 0.5s ease;
      z-index: 1;
    }
    .life-bar-avg {
      position: absolute; top: 0; height: 100%;
      width: 1px;
      background: rgba(255,255,255,0.15);
      z-index: 3;
    }
    .life-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      font-family: var(--font-body);
      color: var(--dim);
      margin-bottom: 44px;
    }

    /* Sliders */
    .slider-list { display: flex; flex-direction: column; gap: 20px; }
    .slider-card {
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .slider-label-wrap { display: flex; align-items: center; gap: 10px; }
    .slider-icon { font-size: 1.1rem; }
    .slider-label { font-family: var(--font-body); font-size: 0.82rem; color: var(--soft); font-weight: 400; }
    .slider-badge {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .slider-badge.pos { background: rgba(138,184,126,0.1); color: var(--green); }
    .slider-badge.neg { background: rgba(196,122,106,0.1); color: var(--red); }
    .slider-badge.neu { background: rgba(255,255,255,0.03); color: var(--dim); }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(196,149,106,0.3);
    }
    input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 14px rgba(196,149,106,0.5); }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .slider-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }
    .slider-tick {
      font-family: var(--font-body);
      font-size: 0.55rem;
      color: var(--dim);
      font-weight: 300;
      transition: color 0.2s;
      text-align: center;
      flex: 1;
    }
    .slider-tick.active { color: var(--accent); font-weight: 500; }

    .whatif-disclaimer {
      margin-top: 24px;
      font-family: var(--font-body);
      font-size: 0.63rem;
      color: var(--dim);
      font-weight: 300;
      line-height: 1.7;
      font-style: italic;
    }

    /* ── Historical ── */
    .hist-title {
      font-family: var(--font-display);
      font-size: clamp(1.15rem, 3.5vw, 1.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .hist-sub {
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--dim);
      margin-bottom: 14px;
      font-weight: 300;
    }
    .hist-legend {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      font-size: 0.58rem;
      font-family: var(--font-body);
      color: var(--dim);
    }
    .hist-legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-bar { width: 12px; height: 5px; border-radius: 3px; }
    .legend-tick { width: 3px; height: 9px; border-radius: 2px; background: var(--accent); }

    .cat-block { margin-bottom: 36px; }
    .cat-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--soft);
      margin-bottom: 2px;
    }
    .cat-desc {
      font-family: var(--font-body);
      font-size: 0.68rem;
      color: var(--dim);
      font-weight: 300;
      font-style: italic;
      margin-bottom: 10px;
    }

    .figure-card {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .figure-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .figure-name {
      font-family: var(--font-display);
      font-size: 1.02rem;
      font-weight: 500;
      color: var(--soft);
    }
    .figure-meta {
      font-family: var(--font-body);
      font-size: 0.58rem;
      color: var(--dim);
      font-weight: 300;
    }
    .figure-bars { position: relative; height: 24px; margin-bottom: 10px; }
    .figure-bar-their {
      position: absolute; top: 0; left: 0; height: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 5px;
    }
    .figure-bar-milestone {
      position: absolute; top: -2px; width: 3px; height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }
    .figure-bar-you {
      position: absolute; top: 14px; left: 0; height: 10px;
      background: linear-gradient(90deg, var(--accent), rgba(196,149,106,0.35));
      border-radius: 5px;
    }
    .figure-desc {
      font-family: var(--font-body);
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }
    .figure-desc .milestone { color: var(--accent); }
    .figure-desc .quote { color: var(--dim); font-style: italic; }

    .show-more-btn {
      margin-top: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 0.68rem;
      font-family: var(--font-body);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .show-more-btn:hover { border-color: rgba(255,255,255,0.12); color: var(--soft); }

    /* ── Footer ── */
    .footer {
      margin-top: 80px;
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      line-height: 1.6;
    }
    .footer-attr {
      font-size: 0.7rem;
      font-family: var(--font-body);
      font-style: normal;
      margin-top: 8px;
      color: #4a443c;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    ::selection { background: rgba(196,149,106,0.3); }
  </style>
</head>
<body>
  <div id="app">
    <a href="../" class="back-btn">← Apps</a>

    <!-- Header -->
    <div id="header" style="margin-bottom:56px; animation: fadeIn 0.8s ease both;">
      <div style="font-family:var(--font-display);font-size:clamp(2rem,6.5vw,3.2rem);font-weight:300;line-height:1.15;color:var(--text);margin-bottom:14px;">
        How much life<br>is left to live?
      </div>
      <div style="font-size:0.82rem;color:var(--dim);font-weight:300;line-height:1.7;max-width:420px;">
        A quiet reflection on the time you have — counted in meals, shaped by choices, measured against those who came before.
      </div>
    </div>

    <!-- Landing form -->
    <div id="landing" style="animation: fadeIn 0.8s 0.15s ease both;"></div>

    <!-- Content sections -->
    <div id="content" style="display:none;">
      <div id="section-meals" class="section-block fade-in"></div>
      <div id="section-whatif" class="section-block fade-in"></div>
      <div id="section-historical" class="fade-in"></div>
      <div class="footer">
        "The proper function of man is to live, not to exist."
        <div class="footer-attr">— Jack London</div>
      </div>
    </div>
  </div>

  <script>
    // ─── DATA ─────────────────────────────────────────────────────────────────

    const LIFE_TABLE = { male: 76, female: 81, other: 78 };

    const HISTORICAL_FIGURES = [
      { name: "Vera Wang",        birth: 1949, death: null, age: null, field: "Fashion",      milestone: "Designed her first dress",                   milestoneAge: 40, quote: "Was a figure skater and journalist before fashion.",           category: "late" },
      { name: "Julia Child",      birth: 1912, death: 2004, age: 91,   field: "Culinary",     milestone: "Published Mastering the Art of French Cooking", milestoneAge: 49, quote: "Didn't even learn to cook until her mid-30s.",               category: "late" },
      { name: "Toni Morrison",    birth: 1931, death: 2019, age: 88,   field: "Literature",   milestone: "Published The Bluest Eye",                    milestoneAge: 39, quote: "Won the Nobel Prize in Literature at 62.",                  category: "late" },
      { name: "Maya Angelou",     birth: 1928, death: 2014, age: 86,   field: "Literature",   milestone: "Published I Know Why the Caged Bird Sings",   milestoneAge: 41, quote: "Didn't publish her first book until age 41.",               category: "late" },
      { name: "Hokusai",          birth: 1760, death: 1849, age: 88,   field: "Art",          milestone: "Created The Great Wave",                      milestoneAge: 71, quote: "Said at 73: 'At 110, every dot and stroke will be alive.'", category: "late" },
      { name: "Charles Darwin",   birth: 1809, death: 1882, age: 73,   field: "Science",      milestone: "Published On the Origin of Species",          milestoneAge: 50, quote: "Spent 20 years refining his theory before publishing.",     category: "late" },
      { name: "Mozart",           birth: 1756, death: 1791, age: 35,   field: "Music",        milestone: "Composed Symphony No. 1",                     milestoneAge: 8,  quote: "Had already composed 600+ works by the time he died.",      category: "prodigy" },
      { name: "Frida Kahlo",      birth: 1907, death: 1954, age: 47,   field: "Art",          milestone: "First solo exhibition",                       milestoneAge: 32, quote: "Began painting seriously after a bus accident at 18.",       category: "prodigy" },
      { name: "Vincent van Gogh", birth: 1853, death: 1890, age: 37,   field: "Art",          milestone: "Painted The Starry Night",                    milestoneAge: 36, quote: "Only painted for the last 10 years of his life.",           category: "prodigy" },
      { name: "Alexander the Great", birth: -356, death: -323, age: 32, field: "Leadership", milestone: "Conquered the Persian Empire",                 milestoneAge: 25, quote: "Ruled one of history's largest empires before turning 30.", category: "prodigy" },
      { name: "Marie Curie",      birth: 1867, death: 1934, age: 66,   field: "Science",      milestone: "First Nobel Prize",                           milestoneAge: 36, quote: "First person to win Nobel Prizes in two different sciences.", category: "peer" },
      { name: "Leonardo da Vinci",birth: 1452, death: 1519, age: 67,   field: "Art & Science",milestone: "Began painting The Last Supper",              milestoneAge: 43, quote: "Didn't start his most famous works until his 40s and 50s.", category: "peer" },
      { name: "Nikola Tesla",     birth: 1856, death: 1943, age: 86,   field: "Science",      milestone: "Patented AC motor",                           milestoneAge: 32, quote: "Arrived in America at 28 with four cents in his pocket.",   category: "peer" },
      { name: "Ada Lovelace",     birth: 1815, death: 1852, age: 36,   field: "Computing",    milestone: "Wrote the first computer algorithm",          milestoneAge: 27, quote: "Envisioned computing a century before it existed.",          category: "peer" },
    ];

    const CATEGORIES = [
      { id: "late",    label: "Late Bloomers",         description: "Proof that your timeline is yours alone" },
      { id: "prodigy", label: "Prodigies & Flames",    description: "Bright and brief — or just early starters" },
      { id: "peer",    label: "Your Contemporaries",   description: "People who hit their stride around where you are" },
    ];

    const WHAT_IF_FACTORS = [
      { id: "exercise",  label: "Exercise",          icon: "🏃", min: 0, max: 4, def: 2, unit: ["Sedentary","Light walks","2-3x / week","Daily moderate","Daily vigorous"], yearsPerStep: [-2,0,1.5,3.2,4.5] },
      { id: "hydration", label: "Hydration",         icon: "💧", min: 0, max: 3, def: 1, unit: ["Rarely drinks water","A few glasses","2+ liters daily","Consistently optimal"], yearsPerStep: [-1.5,0,0.8,1.5] },
      { id: "sleep",     label: "Sleep",             icon: "🌙", min: 0, max: 3, def: 2, unit: ["Poor (<5h)","Inconsistent","7–8 hours","Optimized routine"], yearsPerStep: [-3,-1,0,1.5] },
      { id: "diet",      label: "Diet",              icon: "🥗", min: 0, max: 3, def: 1, unit: ["Highly processed","Mixed","Mostly whole foods","Mediterranean"], yearsPerStep: [-3,0,1.5,2.5] },
      { id: "stress",    label: "Stress level",      icon: "🧠", min: 0, max: 3, def: 1, unit: ["Chronic / unmanaged","Frequent","Moderate","Well-managed"], yearsPerStep: [-4,-1.5,0,2] },
      { id: "alcohol",   label: "Alcohol",           icon: "🍷", min: 0, max: 3, def: 0, unit: ["None / rare","Occasional","Regular","Heavy"], yearsPerStep: [0,-0.2,-1.5,-5] },
      { id: "social",    label: "Social bonds",      icon: "💛", min: 0, max: 3, def: 1, unit: ["Isolated","A few connections","Close circle","Deep community"], yearsPerStep: [-4,0,1.2,2] },
      { id: "learning",  label: "Lifelong learning", icon: "📚", min: 0, max: 3, def: 1, unit: ["Stopped learning","Occasional reading","Regular curiosity","Actively studying"], yearsPerStep: [-1,0,1,2] },
    ];

    // ─── STATE ────────────────────────────────────────────────────────────────

    const state = {
      birthYear: '',
      birthMonth: '',
      sex: '',
      started: false,
      expectedAge: 78,
      sliders: WHAT_IF_FACTORS.reduce((a, f) => { a[f.id] = f.def; return a; }, {}),
      expanded: {},
    };

    // ─── HELPERS ──────────────────────────────────────────────────────────────

    function getAge(birthYear, birthMonth) {
      const today = new Date();
      let age = today.getFullYear() - birthYear;
      if (today.getMonth() + 1 < birthMonth) age--;
      return age;
    }

    function fmt(n) { return Math.round(n).toLocaleString(); }

    function currentAge() {
      return getAge(Number(state.birthYear), Number(state.birthMonth));
    }

    function computeExpectedAge() {
      const base = LIFE_TABLE[state.sex] || 78;
      const delta = WHAT_IF_FACTORS.reduce((s, f) => s + f.yearsPerStep[state.sliders[f.id]], 0);
      return Math.max(currentAge() + 1, Math.round(base + delta));
    }

    function computeDelta() {
      const base = LIFE_TABLE[state.sex] || 78;
      return WHAT_IF_FACTORS.reduce((s, f) => s + f.yearsPerStep[state.sliders[f.id]], 0);
    }

    // ─── RENDER: LANDING FORM ─────────────────────────────────────────────────

    function renderLanding() {
      const el = document.getElementById('landing');
      const canStart = state.birthYear && state.birthMonth && state.sex
                    && currentAge() > 0 && currentAge() < 120;

      el.innerHTML = `
        <div class="form-group">
          <div>
            <label class="form-label">Birth year</label>
            <input id="inp-year" type="number" class="form-input" value="${state.birthYear}">
          </div>
          <div>
            <label class="form-label">Birth month</label>
            <select id="inp-month" class="form-input" style="color:${state.birthMonth ? 'var(--text)' : 'var(--dim)'};">
              <option value="" style="background:var(--bg)">Select month</option>
              ${["January","February","March","April","May","June","July","August","September","October","November","December"]
                .map((m, i) => `<option value="${i+1}" ${state.birthMonth == i+1 ? 'selected' : ''} style="background:var(--bg)">${m}</option>`)
                .join('')}
            </select>
          </div>
          <div>
            <label class="form-label">Biological sex <em>(for life expectancy baseline)</em></label>
            <div class="sex-group">
              ${[{v:'male',l:'Male'},{v:'female',l:'Female'},{v:'other',l:'Prefer not to say'}]
                .map(o => `<button class="sex-btn ${state.sex===o.v?'active':''}" data-sex="${o.v}">${o.l}</button>`)
                .join('')}
            </div>
          </div>
        </div>
        <button id="start-btn" class="start-btn ${canStart?'ready':''}">Show me</button>
      `;

      document.getElementById('inp-year').addEventListener('input', e => {
        state.birthYear = e.target.value;
        refreshStartBtn();
      });
      document.getElementById('inp-month').addEventListener('change', e => {
        state.birthMonth = e.target.value;
        e.target.style.color = state.birthMonth ? 'var(--text)' : 'var(--dim)';
        refreshStartBtn();
      });
      el.querySelectorAll('.sex-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.sex = btn.dataset.sex;
          el.querySelectorAll('.sex-btn').forEach(b => b.classList.toggle('active', b.dataset.sex === state.sex));
          refreshStartBtn();
        });
      });
      document.getElementById('start-btn').addEventListener('click', () => {
        if (!canStartNow()) return;
        state.started = true;
        state.expectedAge = computeExpectedAge();
        document.getElementById('landing').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        renderMeals();
        renderWhatIf();
        renderHistorical();
      });
    }

    function canStartNow() {
      return state.birthYear && state.birthMonth && state.sex
          && currentAge() > 0 && currentAge() < 120;
    }

    function refreshStartBtn() {
      const btn = document.getElementById('start-btn');
      if (!btn) return;
      const ok = canStartNow();
      btn.classList.toggle('ready', ok);
      btn.onclick = ok ? () => {
        state.started = true;
        state.expectedAge = computeExpectedAge();
        document.getElementById('landing').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        renderMeals();
        renderWhatIf();
        renderHistorical();
      } : null;
    }

    // ─── RENDER: MEALS ────────────────────────────────────────────────────────

    function renderMeals() {
      const age = currentAge();
      const expectedAge = state.expectedAge;
      const yrsLeft = Math.max(0, expectedAge - age);

      const mealsLived = Math.round(age * 365.25 * 3);
      const mealsLeft  = Math.round(yrsLeft * 365.25 * 3);
      const homeCookedHad   = Math.round(mealsLived * 0.6);
      const sharedWithLoved = Math.round(mealsLived * 0.35);
      const newRecipesTried = Math.round(age * 20);
      const breakfastsLeft  = Math.round(yrsLeft * 365.25);
      const fridayDinners   = Math.round(yrsLeft * 52);
      const holidayFeasts   = Math.round(yrsLeft * 8);
      const sundayBrunches  = Math.round(yrsLeft * 40);

      const dotsTotal = Math.min(Math.round((mealsLived + mealsLeft) / 100), 900);
      const dotsLived = Math.round(mealsLived / 100);

      const dots = Array.from({length: dotsTotal}, (_, i) => {
        let cls = 'dot ';
        if (i < dotsLived) cls += 'dot-lived';
        else if (i < dotsLived + 10) cls += 'dot-next';
        else cls += 'dot-future';
        return `<div class="${cls}"></div>`;
      }).join('');

      const celebratory = [
        { val: fmt(mealsLived),       text: "meals enjoyed so far — every one of them kept you going", accent: true },
        { val: fmt(homeCookedHad),    text: "of those were home-cooked, made with your hands or someone who cared", accent: true },
        { val: fmt(sharedWithLoved),  text: "shared with people you love", accent: true },
        { val: `~${fmt(newRecipesTried)}`, text: "new recipes tried — flavors that expanded your world", accent: true },
      ];
      const remaining = [
        { val: fmt(breakfastsLeft), text: "breakfasts remaining — slow mornings are never wasted" },
        { val: fmt(fridayDinners),  text: "Friday dinners, each one a small celebration" },
        { val: fmt(sundayBrunches), text: "Sunday brunches ahead of you" },
        { val: fmt(holidayFeasts),  text: "holiday feasts — the ones you'll remember forever" },
      ];

      document.getElementById('section-meals').innerHTML = `
        <div class="section-tag">I. Meals — Past &amp; Future</div>
        <div class="big-num">${fmt(mealsLeft)}</div>
        <div class="big-sub">meals ahead of you — give or take a midnight snack</div>

        <div class="dot-grid">${dots}</div>
        <div class="dot-legend">
          <span><div class="legend-dot" style="background:#5a5248"></div>lived</span>
          <span><div class="legend-dot" style="background:#c4956a"></div>next 1,000</span>
          <span><div class="legend-dot" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)"></div>remaining</span>
          <span style="margin-left:4px;">· 1 dot ≈ 100 meals</span>
        </div>

        <div class="section-heading">Look back — you've savored a lot already.</div>
        <div class="stat-list" style="margin-bottom:52px;">
          ${celebratory.map(s => `<div class="stat-item"><span class="stat-val-accent">${s.val}</span> ${s.text}</div>`).join('')}
        </div>

        <div class="section-heading">And there's still so much on the table.</div>
        <div class="stat-list">
          ${remaining.map(s => `<div class="stat-item"><span class="stat-val-soft">${s.val}</span> ${s.text}</div>`).join('')}
        </div>
      `;
    }

    // ─── RENDER: WHAT IF ──────────────────────────────────────────────────────

    function renderWhatIf() {
      const age = currentAge();
      const base = LIFE_TABLE[state.sex] || 78;
      const el = document.getElementById('section-whatif');

      function html() {
        const delta    = computeDelta();
        const adjusted = computeExpectedAge();
        const livePct  = Math.min((age / 100) * 100, 100);
        const remainPct = Math.min((Math.max(0, adjusted - age) / 100) * 100, 100);
        const remainColor = delta >= 0
          ? 'linear-gradient(90deg,rgba(138,184,126,0.3),rgba(138,184,126,0.08))'
          : 'linear-gradient(90deg,rgba(196,122,106,0.3),rgba(196,122,106,0.08))';
        const deltaClass = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'neu';
        const deltaText  = delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '±0';

        const slidersHtml = WHAT_IF_FACTORS.map(f => {
          const v   = state.sliders[f.id];
          const yd  = f.yearsPerStep[v];
          const pct = (v / f.max) * 100;
          const badgeCls = yd > 0 ? 'pos' : yd < 0 ? 'neg' : 'neu';
          const ydText   = yd > 0 ? `+${yd}` : yd < 0 ? yd : '±0';
          const ticks    = f.unit.map((u, i) => `<span class="slider-tick ${i===v?'active':''}">${u}</span>`).join('');
          return `
            <div class="slider-card">
              <div class="slider-header">
                <div class="slider-label-wrap">
                  <span class="slider-icon">${f.icon}</span>
                  <span class="slider-label">${f.label}</span>
                </div>
                <span class="slider-badge ${badgeCls}">${ydText} yr</span>
              </div>
              <input type="range" min="${f.min}" max="${f.max}" step="1" value="${v}" data-id="${f.id}"
                style="background:linear-gradient(to right,var(--accent) ${pct}%,rgba(255,255,255,0.06) ${pct}%)">
              <div class="slider-ticks">${ticks}</div>
            </div>
          `;
        }).join('');

        return `
          <div class="section-tag">II. What If</div>
          <div class="whatif-title">Your choices reshape the timeline.</div>
          <div class="whatif-sub">Drag the sliders. Watch your estimated years shift. This feeds into every number above and below.</div>

          <div class="whatif-big">
            <div class="whatif-age">${adjusted}</div>
            <div>
              <div class="whatif-label">estimated years</div>
              <div class="whatif-delta ${deltaClass}">${deltaText} from baseline ${base}</div>
            </div>
          </div>

          <div class="life-bar-wrap">
            <div class="life-bar-lived" style="width:${livePct}%"></div>
            <div class="life-bar-remain" style="left:${livePct}%;width:${remainPct}%;background:${remainColor}"></div>
            <div class="life-bar-avg" style="left:${base}%"></div>
          </div>
          <div class="life-bar-labels">
            <span>Born</span><span>Now (${age})</span><span>Avg (${base})</span><span>100</span>
          </div>

          <div class="slider-list">${slidersHtml}</div>

          <div class="whatif-disclaimer">
            Estimates drawn from the Global Burden of Disease study, meta-analyses in The Lancet and BMJ, and SSA life tables. A thought exercise, not a medical prediction.
          </div>
        `;
      }

      el.innerHTML = html();

      el.querySelectorAll('input[type="range"]').forEach(inp => {
        inp.addEventListener('input', e => {
          state.sliders[e.target.dataset.id] = Number(e.target.value);
          state.expectedAge = computeExpectedAge();
          el.innerHTML = html();
          // Re-attach listeners
          attachSliderListeners();
          // Update meals section too
          renderMeals();
        });
      });

      function attachSliderListeners() {
        el.querySelectorAll('input[type="range"]').forEach(inp => {
          inp.addEventListener('input', e => {
            state.sliders[e.target.dataset.id] = Number(e.target.value);
            state.expectedAge = computeExpectedAge();
            el.innerHTML = html();
            attachSliderListeners();
            renderMeals();
          });
        });
      }
    }

    // ─── RENDER: HISTORICAL ───────────────────────────────────────────────────

    function renderHistorical() {
      const age = currentAge();
      const el  = document.getElementById('section-historical');

      function html() {
        const catsHtml = CATEGORIES.map(cat => {
          const figs   = HISTORICAL_FIGURES.filter(f => f.category === cat.id);
          const sorted = [...figs].sort((a, b) => Math.abs(a.milestoneAge - age) - Math.abs(b.milestoneAge - age));
          const isExp  = state.expanded[cat.id];
          const visible = isExp ? sorted : sorted.slice(0, 3);
          const extra  = sorted.length - 3;

          const figsHtml = visible.map(f => {
            const lifespan = f.death ? f.age : (new Date().getFullYear() - f.birth);
            const theirPct = Math.min((lifespan / 100) * 100, 100);
            const milestonePct = lifespan > 0 ? (f.milestoneAge / lifespan) * 100 : 0;
            const youPct = Math.min((age / 100) * 100, 100);
            const reached = age >= f.milestoneAge;
            const birthStr = f.birth < 0 ? `${Math.abs(f.birth)} BC` : f.birth;
            const deathStr = f.death || 'present';
            const descHtml = reached
              ? `You've passed the age they achieved <span class="milestone">${f.milestone.toLowerCase()}</span> (${f.milestoneAge}). <span class="quote">${f.quote}</span>`
              : `<span class="milestone">${f.milestone}</span> at ${f.milestoneAge} — ${f.milestoneAge - age} years from now. <span class="quote">${f.quote}</span>`;

            return `
              <div class="figure-card">
                <div class="figure-header">
                  <div class="figure-name">${f.name}</div>
                  <div class="figure-meta">${f.field} · ${birthStr}–${deathStr}</div>
                </div>
                <div class="figure-bars">
                  <div class="figure-bar-their" style="width:${theirPct}%">
                    <div class="figure-bar-milestone" style="left:${milestonePct}%"></div>
                  </div>
                  <div class="figure-bar-you" style="width:${youPct}%"></div>
                </div>
                <div class="figure-desc">${descHtml}</div>
              </div>
            `;
          }).join('');

          const moreBtn = extra > 0
            ? `<button class="show-more-btn" data-cat="${cat.id}">${isExp ? 'Show less' : `+ ${extra} more`}</button>`
            : '';

          return `
            <div class="cat-block">
              <div class="cat-name">${cat.label}</div>
              <div class="cat-desc">${cat.description}</div>
              ${figsHtml}
              ${moreBtn}
            </div>
          `;
        }).join('');

        return `
          <div class="section-tag">III. Lives Alongside Yours</div>
          <div class="hist-title">At ${age}, your story is still unfolding.</div>
          <div class="hist-sub">See where you stand on the timelines of those who came before.</div>
          <div class="hist-legend">
            <div class="hist-legend-item"><div class="legend-bar" style="background:rgba(255,255,255,0.06)"></div>Their life</div>
            <div class="hist-legend-item"><div class="legend-bar" style="background:var(--accent);opacity:0.7"></div>You so far</div>
            <div class="hist-legend-item"><div class="legend-tick"></div>Milestone</div>
          </div>
          ${catsHtml}
        `;
      }

      el.innerHTML = html();

      el.querySelectorAll('.show-more-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.cat;
          state.expanded[cat] = !state.expanded[cat];
          el.innerHTML = html();
          attachHistoricalListeners();
        });
      });

      function attachHistoricalListeners() {
        el.querySelectorAll('.show-more-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const cat = btn.dataset.cat;
            state.expanded[cat] = !state.expanded[cat];
            el.innerHTML = html();
            attachHistoricalListeners();
          });
        });
      }
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────

    renderLanding();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
