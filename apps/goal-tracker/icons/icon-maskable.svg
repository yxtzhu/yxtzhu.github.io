  <circle cx="256" cy="256" r="80"  fill="none" stroke="#000" stroke-width="26" stroke-opacity="0.35"/>
  <circle cx="256" cy="256" r="34"  fill="#000" fill-opacity="0.6"/>
  <line x1="256" y1="110" x2="256" y2="158" stroke="#000" stroke-width="20" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="256" y1="354" x2="256" y2="402" stroke="#000" stroke-width="20" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="110" y1="256" x2="158" y2="256" stroke="#000" stroke-width="20" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="354" y1="256" x2="402" y2="256" stroke="#000" stroke-width="20" stroke-linecap="round" stroke-opacity="0.25"/>
</svg>
