<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Target / bullseye icon -->
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#000" stroke-width="28" stroke-opacity="0.25"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="95" fill="none" stroke="#000" stroke-width="28" stroke-opacity="0.35"/>
  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="42" fill="#000" fill-opacity="0.6"/>
  <!-- Crosshair lines -->
  <line x1="256" y1="82" x2="256" y2="140" stroke="#000" stroke-width="22" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="256" y1="372" x2="256" y2="430" stroke="#000" stroke-width="22" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="82" y1="256" x2="140" y2="256" stroke="#000" stroke-width="22" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="372" y1="256" x2="430" y2="256" stroke="#000" stroke-width="22" stroke-linecap="round" stroke-opacity="0.25"/>
</svg>
