<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Goals">
  <meta name="theme-color" content="#000000">
  <title>Goal Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --accent: #43e97b;
      --accent2: #38f9d7;
      --bg: #000000;
      --surface: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.10);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --danger: #ff453a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; background: var(--bg); }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 15% 10%, rgba(67, 233, 123, 0.14) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(56, 249, 215, 0.11) 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 75% 20%, rgba(67, 233, 123, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Offline banner ── */
    .offline-banner {
      background: rgba(255, 159, 10, 0.15);
      border-bottom: 1px solid rgba(255, 159, 10, 0.2);
      padding: 8px 20px;
      font-size: 13px;
      color: #ff9f0a;
      text-align: center;
      display: none;
    }
    .offline-banner.visible { display: block; }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: calc(var(--safe-top) + 16px) calc(var(--safe-right) + 20px) 0 calc(var(--safe-left) + 20px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0) 100%);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 0;
      text-decoration: none;
      font-family: inherit;
    }

    .header-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #000;
      font-size: 24px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(67, 233, 123, 0.45);
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
    }
    .add-btn:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(67,233,123,0.25); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 0 0 14px 0;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--surface);
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 12px calc(var(--safe-right) + 16px) calc(var(--safe-bottom) + 32px) calc(var(--safe-left) + 16px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      gap: 12px;
      text-align: center;
    }
    .empty-icon { font-size: 56px; }
    .empty-title { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.35); }
    .empty-body { font-size: 14px; max-width: 220px; line-height: 1.5; color: rgba(255,255,255,0.22); }

    /* ── Goal card ── */
    .goal-card {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-top-color: rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s;
    }
    .goal-card:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .check-btn {
      width: 26px;
      height: 26px;
      min-width: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all 0.2s;
      color: transparent;
      font-family: inherit;
    }
    .check-btn.done {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #000;
    }
    .check-btn svg { width: 12px; height: 12px; }

    .card-info { flex: 1; min-width: 0; }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .card-title.done {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .category-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.65);
    }

    .due-date {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .due-date.overdue { color: var(--danger); }

    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .progress-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.09);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-pct {
      font-size: 12px;
      color: var(--text-secondary);
      min-width: 32px;
      text-align: right;
    }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    /* ── Modal sheet ── */
    .modal-sheet {
      width: 100%;
      background: #1c1c1e;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 8px 20px calc(var(--safe-bottom) + 24px);
      max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-backdrop.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      margin: 8px auto 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s;
    }
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus { border-color: var(--accent); }

    .form-textarea { resize: none; min-height: 80px; }
    .form-select option { background: #1c1c1e; }

    .form-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.14);
      outline: none;
      cursor: pointer;
    }
    .form-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 2px 10px rgba(67,233,123,0.45);
      cursor: pointer;
    }

    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-val {
      font-size: 14px;
      font-weight: 600;
      min-width: 38px;
      text-align: right;
      color: var(--accent);
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
    }
    .btn:active { transform: scale(0.98); opacity: 0.82; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      margin-bottom: 10px;
    }
    .btn-danger {
      background: rgba(255,69,58,0.14);
      color: var(--danger);
      border: 1px solid rgba(255,69,58,0.22);
      margin-bottom: 10px;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* ── Error ── */
    .error-msg {
      background: rgba(255,69,58,0.12);
      border: 1px solid rgba(255,69,58,0.22);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--danger);
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Detail sheet extras ── */
    .detail-desc {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 24px;
      white-space: pre-wrap;
    }

    .detail-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .detail-meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .detail-meta-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .detail-meta-value {
      font-size: 15px;
      font-weight: 500;
    }
    .detail-meta-value.overdue { color: var(--danger); }

    .detail-section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .detail-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .detail-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="offline-banner" id="offline-banner">No internet — changes will sync when back online</div>

    <div class="header">
      <div class="header-row">
        <a href="../" class="back-btn">
          <svg width="9" height="15" viewBox="0 0 9 15" fill="none">
            <path d="M7.5 1L1 7.5l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Apps
        </a>
        <div class="header-title">Goals</div>
        <button class="add-btn" id="add-btn" aria-label="Add goal">+</button>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-active">Active</button>
        <button class="tab" id="tab-done">Completed</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <!-- Add / Edit modal -->
  <div class="modal-backdrop" id="form-modal" role="dialog" aria-modal="true" aria-label="Goal form">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="form-modal-title">New Goal</div>
      <div class="error-msg" id="form-error"></div>

      <div class="form-group">
        <label class="form-label" for="input-title">Title</label>
        <input class="form-input" id="input-title" type="text" placeholder="What do you want to achieve?" maxlength="100" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-desc">Description</label>
        <textarea class="form-textarea" id="input-desc" placeholder="Why does this matter? What's the plan?" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-date">Target Date</label>
        <input class="form-input" id="input-date" type="date">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-category">Category</label>
        <select class="form-select" id="input-category">
          <option value="personal">👤 Personal</option>
          <option value="health">💪 Health</option>
          <option value="work">💼 Work</option>
          <option value="learning">📚 Learning</option>
          <option value="finance">💰 Finance</option>
          <option value="relationships">❤️ Relationships</option>
          <option value="other">⭐ Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Progress — <span id="form-slider-display">0%</span></label>
        <div class="slider-row">
          <input class="form-slider" type="range" min="0" max="100" value="0" id="input-progress" style="flex:1">
        </div>
      </div>

      <button class="btn btn-primary" id="form-save-btn">Save Goal</button>
      <button class="btn btn-secondary" id="form-cancel-btn">Cancel</button>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-backdrop" id="detail-modal" role="dialog" aria-modal="true" aria-label="Goal detail">
    <div class="modal-sheet" id="detail-sheet">
      <div class="modal-handle"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
    import {
      getFirestore,
      collection,
      addDoc,
      doc,
      updateDoc,
      deleteDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp,
      enableIndexedDbPersistence
    } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

    // ── Firebase ──
    const fbApp = initializeApp({
      apiKey: "AIzaSyAPxK-GfS47ohETvTJWCFh6njZDvbYZ8bM",
      authDomain: "goal-tracker-28e81.firebaseapp.com",
      projectId: "goal-tracker-28e81",
      storageBucket: "goal-tracker-28e81.firebasestorage.app",
      messagingSenderId: "1024120775562",
      appId: "1:1024120775562:web:9048cb99c6d5cbdd405e73"
    });

    const db = getFirestore(fbApp);
    enableIndexedDbPersistence(db).catch(() => {});

    // ── Offline ──
    const offlineBanner = document.getElementById('offline-banner');
    window.addEventListener('online',  () => offlineBanner.classList.remove('visible'));
    window.addEventListener('offline', () => offlineBanner.classList.add('visible'));
    if (!navigator.onLine) offlineBanner.classList.add('visible');

    // ── State ──
    let goals = [];
    let currentTab = 'active';
    let editingId = null;

    // ── Refs ──
    const content        = document.getElementById('content');
    const addBtn         = document.getElementById('add-btn');
    const formModal      = document.getElementById('form-modal');
    const detailModal    = document.getElementById('detail-modal');
    const detailSheet    = document.getElementById('detail-sheet');
    const formModalTitle = document.getElementById('form-modal-title');
    const formError      = document.getElementById('form-error');
    const inputTitle     = document.getElementById('input-title');
    const inputDesc      = document.getElementById('input-desc');
    const inputDate      = document.getElementById('input-date');
    const inputCategory  = document.getElementById('input-category');
    const inputProgress  = document.getElementById('input-progress');
    const sliderDisplay  = document.getElementById('form-slider-display');
    const formSaveBtn    = document.getElementById('form-save-btn');
    const formCancelBtn  = document.getElementById('form-cancel-btn');

    // ── Firestore live sync ──
    const goalsRef = collection(db, 'goals');
    const q = query(goalsRef, orderBy('createdAt', 'desc'));

    onSnapshot(q, snap => {
      goals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGoals();
    }, err => {
      content.innerHTML = `<div class="loading" style="color:var(--danger)">Failed to load. Check your connection.</div>`;
      console.error(err);
    });

    // ── Tabs ──
    document.getElementById('tab-active').addEventListener('click', () => setTab('active'));
    document.getElementById('tab-done').addEventListener('click',   () => setTab('done'));

    function setTab(tab) {
      currentTab = tab;
      document.getElementById('tab-active').classList.toggle('active', tab === 'active');
      document.getElementById('tab-done').classList.toggle('active',   tab === 'done');
      renderGoals();
    }

    // ── Render ──
    function renderGoals() {
      const list = goals.filter(g => currentTab === 'active' ? g.status !== 'done' : g.status === 'done');

      if (list.length === 0) {
        content.innerHTML = currentTab === 'active'
          ? `<div class="empty">
               <div class="empty-icon">🎯</div>
               <div class="empty-title">No active goals</div>
               <div class="empty-body">Tap + to set your first goal</div>
             </div>`
          : `<div class="empty">
               <div class="empty-icon">✅</div>
               <div class="empty-title">Nothing completed yet</div>
               <div class="empty-body">Mark a goal done when you achieve it</div>
             </div>`;
        return;
      }

      content.innerHTML = list.map(goalCardHTML).join('');

      list.forEach(g => {
        document.getElementById(`card-${g.id}`).addEventListener('click', e => {
          if (e.target.closest('.check-btn')) return;
          openDetail(g);
        });
        document.getElementById(`check-${g.id}`).addEventListener('click', e => {
          e.stopPropagation();
          toggleDone(g);
        });
      });
    }

    // ── Helpers ──
    const CATEGORY_LABELS = {
      personal: '👤 Personal', health: '💪 Health', work: '💼 Work',
      learning: '📚 Learning', finance: '💰 Finance',
      relationships: '❤️ Relationships', other: '⭐ Other'
    };

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(s) {
      if (!s) return null;
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function isOverdue(s) {
      if (!s) return false;
      const [y, m, d] = s.split('-').map(Number);
      const t = new Date(); t.setHours(0,0,0,0);
      return new Date(y, m - 1, d) < t;
    }

    function goalCardHTML(g) {
      const pct  = g.progress ?? 0;
      const done = g.status === 'done';
      const ov   = !done && isOverdue(g.targetDate);

      const dueBadge = g.targetDate
        ? `<span class="due-date${ov ? ' overdue' : ''}">${ov ? '⚠️ ' : ''}${formatDate(g.targetDate)}</span>`
        : '';
      const catBadge = g.category
        ? `<span class="category-badge">${esc(CATEGORY_LABELS[g.category] ?? g.category)}</span>`
        : '';

      return `
        <div class="goal-card" id="card-${g.id}">
          <div class="card-header">
            <button class="check-btn${done ? ' done' : ''}" id="check-${g.id}" aria-label="${done ? 'Mark active' : 'Mark done'}">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1.5,6 4.5,9.5 10.5,2.5"/>
              </svg>
            </button>
            <div class="card-info">
              <div class="card-title${done ? ' done' : ''}">${esc(g.title)}</div>
              <div class="card-meta">${catBadge}${dueBadge}</div>
            </div>
          </div>
          ${g.description ? `<div class="card-desc">${esc(g.description)}</div>` : ''}
          <div class="progress-row">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-pct">${pct}%</span>
          </div>
        </div>`;
    }

    // ── Toggle done ──
    async function toggleDone(g) {
      const going = g.status === 'done' ? 'active' : 'done';
      const upd = { status: going };
      if (going === 'done') { upd.progress = 100; upd.completedAt = serverTimestamp(); }
      else                  { upd.completedAt = null; }
      await updateDoc(doc(db, 'goals', g.id), upd);
    }

    // ── Form modal ──
    addBtn.addEventListener('click', () => openForm(null));
    formCancelBtn.addEventListener('click', closeForm);
    formModal.addEventListener('click', e => { if (e.target === formModal) closeForm(); });
    inputProgress.addEventListener('input', () => { sliderDisplay.textContent = `${inputProgress.value}%`; });
    formSaveBtn.addEventListener('click', saveGoal);

    function openForm(g) {
      editingId = g?.id ?? null;
      formModalTitle.textContent = g ? 'Edit Goal' : 'New Goal';
      inputTitle.value    = g?.title ?? '';
      inputDesc.value     = g?.description ?? '';
      inputDate.value     = g?.targetDate ?? '';
      inputCategory.value = g?.category ?? 'personal';
      inputProgress.value = g?.progress ?? 0;
      sliderDisplay.textContent = `${inputProgress.value}%`;
      formError.textContent = '';
      formError.classList.remove('visible');
      formModal.classList.add('open');
      setTimeout(() => inputTitle.focus(), 350);
    }

    function closeForm() { formModal.classList.remove('open'); }

    async function saveGoal() {
      const title = inputTitle.value.trim();
      if (!title) {
        formError.textContent = 'Title is required.';
        formError.classList.add('visible');
        inputTitle.focus();
        return;
      }

      formSaveBtn.disabled = true;
      formSaveBtn.textContent = 'Saving…';

      const pct = parseInt(inputProgress.value, 10);
      const data = {
        title,
        description: inputDesc.value.trim(),
        targetDate:  inputDate.value || null,
        category:    inputCategory.value,
        progress:    pct,
        status:      pct >= 100 ? 'done' : 'active',
      };

      try {
        if (editingId) {
          await updateDoc(doc(db, 'goals', editingId), data);
        } else {
          data.createdAt = serverTimestamp();
          await addDoc(goalsRef, data);
        }
        closeForm();
      } catch (err) {
        formError.textContent = 'Failed to save. Please try again.';
        formError.classList.add('visible');
        console.error(err);
      }

      formSaveBtn.disabled = false;
      formSaveBtn.textContent = 'Save Goal';
    }

    // ── Detail modal ──
    detailModal.addEventListener('click', e => { if (e.target === detailModal) closeDetail(); });

    function openDetail(g) {
      const done = g.status === 'done';
      const pct  = g.progress ?? 0;
      const ov   = !done && isOverdue(g.targetDate);

      detailSheet.innerHTML = `
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px">
          <div class="modal-title" style="margin-bottom:0">${esc(g.title)}</div>
          ${g.category ? `<span class="category-badge" style="white-space:nowrap">${esc(CATEGORY_LABELS[g.category] ?? g.category)}</span>` : ''}
        </div>

        <div class="detail-meta">
          ${g.targetDate ? `
          <div class="detail-meta-item">
            <span class="detail-meta-label">Target</span>
            <span class="detail-meta-value${ov ? ' overdue' : ''}">${ov ? '⚠️ ' : ''}${formatDate(g.targetDate)}</span>
          </div>` : ''}
          <div class="detail-meta-item">
            <span class="detail-meta-label">Status</span>
            <span class="detail-meta-value">${done ? '✅ Completed' : '🎯 In progress'}</span>
          </div>
        </div>

        ${g.description ? `<p class="detail-desc">${esc(g.description)}</p>` : ''}

        <div class="detail-section-title">Progress — <span id="detail-pct-label">${pct}%</span></div>
        <div class="detail-progress-bar">
          <div class="detail-progress-fill" id="detail-progress-fill" style="width:${pct}%"></div>
        </div>
        <div style="margin-bottom:24px">
          <div class="slider-row">
            <input class="form-slider" type="range" min="0" max="100" value="${pct}" id="detail-slider" style="flex:1">
            <span class="slider-val" id="detail-slider-val">${pct}%</span>
          </div>
        </div>

        <button class="btn btn-primary" id="detail-edit-btn">Edit Goal</button>
        <button class="btn btn-danger"  id="detail-delete-btn">Delete Goal</button>
        <button class="btn btn-secondary" id="detail-close-btn">Close</button>
      `;

      // Progress slider debounced save
      const slider    = document.getElementById('detail-slider');
      const sliderVal = document.getElementById('detail-slider-val');
      const fillBar   = document.getElementById('detail-progress-fill');
      const pctLabel  = document.getElementById('detail-pct-label');
      let debounce;

      slider.addEventListener('input', () => {
        const v = slider.value;
        sliderVal.textContent = `${v}%`;
        pctLabel.textContent  = `${v}%`;
        fillBar.style.width   = `${v}%`;
        clearTimeout(debounce);
        debounce = setTimeout(async () => {
          const n = parseInt(v, 10);
          await updateDoc(doc(db, 'goals', g.id), { progress: n, status: n >= 100 ? 'done' : 'active' });
        }, 700);
      });

      document.getElementById('detail-edit-btn').addEventListener('click', () => {
        closeDetail();
        openForm(g);
      });

      document.getElementById('detail-delete-btn').addEventListener('click', async () => {
        if (!confirm(`Delete "${g.title}"?`)) return;
        await deleteDoc(doc(db, 'goals', g.id));
        closeDetail();
      });

      document.getElementById('detail-close-btn').addEventListener('click', closeDetail);

      detailModal.classList.add('open');
    }

    function closeDetail() { detailModal.classList.remove('open'); }

    // ── Service worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
