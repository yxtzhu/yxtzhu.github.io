<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coin Flip">
  <meta name="theme-color" content="#0a0603">
  <title>Coin Flip</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --bronze-light: #e8a855;
      --bronze-mid: #cd7f32;
      --bronze-dark: #7a4a15;
      --bronze-shine: #f5d88a;
      --patina: #5a9a6a;
      --accent: #d4900a;
      --bg: #0a0603;
      --surface: rgba(205, 127, 50, 0.08);
      --border: rgba(205, 127, 50, 0.2);
      --text: #f5e8c8;
      --text-secondary: rgba(245, 232, 200, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(205, 127, 50, 0.05) 0%, transparent 65%),
        radial-gradient(ellipse at 20% 80%, rgba(90, 154, 106, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.8s ease;
    }

    body.result-heads::before {
      background:
        radial-gradient(ellipse at 50% 40%, rgba(212, 144, 10, 0.14) 0%, transparent 65%),
        radial-gradient(ellipse at 80% 80%, rgba(212, 144, 10, 0.07) 0%, transparent 50%);
    }

    body.result-tails::before {
      background:
        radial-gradient(ellipse at 50% 40%, rgba(90, 154, 106, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse at 20% 80%, rgba(90, 154, 106, 0.06) 0%, transparent 50%);
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(var(--safe-top) + 20px);
      padding-bottom: calc(var(--safe-bottom) + 32px);
      padding-left: calc(var(--safe-left) + 24px);
      padding-right: calc(var(--safe-right) + 24px);
    }

    /* Header */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      font-size: 17px;
      font-weight: 400;
      text-decoration: none;
      padding: 4px 0;
      letter-spacing: -0.2px;
    }

    .back-btn svg {
      width: 10px;
      height: 17px;
      margin-top: 1px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .header-right {
      width: 60px;
      display: flex;
      justify-content: flex-end;
    }

    /* Reset button in header */
    .reset-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 0;
      opacity: 0.8;
      transition: opacity 0.15s;
    }

    .reset-btn:active {
      opacity: 0.5;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
    }

    .stat-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .stat-value.bump {
      transform: scale(1.3);
    }

    .stat-heads .stat-value { color: var(--accent); }
    .stat-tails .stat-value { color: var(--patina); }

    /* Coin stage */
    .coin-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      perspective: 700px;
    }

    /* Shadow beneath coin */
    .coin-shadow {
      width: 170px;
      height: 24px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
      border-radius: 50%;
      margin-top: 8px;
      transition: transform 0.4s ease, opacity 0.4s ease;
      transform: scaleX(1);
      opacity: 0.7;
      order: 2;
    }

    .coin-shadow.flipping {
      transform: scaleX(0.4);
      opacity: 0.25;
    }

    /* 3D Coin wrapper */
    .coin-wrapper {
      order: 1;
      width: 180px;
      height: 180px;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .coin-wrapper:active {
      transform: scale(0.97);
    }

    /* The coin itself spins around Y axis */
    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: none;
      will-change: transform;
    }

    /* Coin faces */
    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* HEADS — warm bronze-gold */
    .coin-heads {
      background: radial-gradient(circle at 35% 30%,
        #f7e4a0 0%,
        #e8a855 16%,
        #cd7f32 40%,
        #9a5a1a 65%,
        #6b3d0e 100%
      );
      box-shadow:
        inset 0 -5px 14px rgba(0,0,0,0.45),
        inset 0 3px 10px rgba(255,230,130,0.25),
        0 6px 30px rgba(0,0,0,0.75),
        0 0 0 5px rgba(155,95,15,0.55),
        0 0 0 8px rgba(205,127,50,0.12);
    }

    /* Outer raised rim */
    .coin-heads::before {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(255,220,100,0.32);
      box-shadow:
        inset 0 1px 4px rgba(0,0,0,0.45),
        0 1px 2px rgba(255,230,150,0.18);
    }

    /* Specular shine */
    .coin-heads::after {
      content: '';
      position: absolute;
      top: -25%;
      left: -25%;
      width: 70%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(255,245,200,0.28) 0%, transparent 70%);
      border-radius: 50%;
      transform: rotate(-25deg);
      pointer-events: none;
    }

    /* TAILS — green patina bronze */
    .coin-tails {
      transform: rotateY(180deg);
      background: radial-gradient(circle at 35% 30%,
        #c8e0c0 0%,
        #7aaa88 18%,
        #4a7c5a 38%,
        #7a5a20 58%,
        #5a3a0a 100%
      );
      box-shadow:
        inset 0 -5px 14px rgba(0,0,0,0.45),
        inset 0 3px 10px rgba(180,220,180,0.15),
        0 6px 30px rgba(0,0,0,0.75),
        0 0 0 5px rgba(70,105,65,0.6),
        0 0 0 8px rgba(90,154,106,0.12);
    }

    .coin-tails::before {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(180,220,160,0.28);
      box-shadow:
        inset 0 1px 4px rgba(0,0,0,0.45),
        0 1px 2px rgba(200,240,200,0.12);
    }

    .coin-tails::after {
      content: '';
      position: absolute;
      top: -25%;
      left: -25%;
      width: 70%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(200,235,210,0.22) 0%, transparent 70%);
      border-radius: 50%;
      transform: rotate(-25deg);
      pointer-events: none;
    }

    /* Chinese characters layout */
    .coin-chars {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .coin-char {
      position: absolute;
      font-family: 'STKaiti', 'KaiTi', 'Kaiti SC', 'SimKai', '楷体', 'STSong', 'SimSun', serif;
      font-weight: 900;
      font-size: 30px;
      line-height: 1;
      color: rgba(10, 4, 0, 0.8);
      text-shadow:
        0 1px 1px rgba(255,210,80,0.35),
        0 -1px 0 rgba(0,0,0,0.55);
      user-select: none;
    }

    .coin-char-top {
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
    }

    .coin-char-bottom {
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
    }

    .coin-char-left {
      top: 50%;
      left: 9%;
      transform: translateY(-50%);
    }

    .coin-char-right {
      top: 50%;
      right: 9%;
      transform: translateY(-50%);
    }

    /* Tails characters: green-tinted shadow */
    .coin-tails .coin-char {
      color: rgba(5, 10, 4, 0.82);
      text-shadow:
        0 1px 1px rgba(160,220,160,0.3),
        0 -1px 0 rgba(0,0,0,0.55);
    }

    /* Square hole */
    .coin-hole {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 26%;
      height: 26%;
      background: #040201;
      border: 2px solid rgba(0,0,0,0.95);
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,1),
        inset 0 -1px 4px rgba(0,0,0,0.9),
        0 0 0 1px rgba(80,50,10,0.35);
      z-index: 2;
    }

    /* Result label */
    .result-label {
      order: 3;
      margin-top: 28px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      opacity: 0;
      transform: translateY(10px) scale(0.85);
      transition: opacity 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      user-select: none;
      text-align: center;
    }

    .result-label.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .result-label.heads-text {
      color: var(--accent);
      text-shadow: 0 0 30px rgba(212,144,10,0.5);
    }

    .result-label.tails-text {
      color: var(--patina);
      text-shadow: 0 0 30px rgba(90,154,106,0.5);
    }

    /* Flip button */
    .flip-btn-wrap {
      width: 100%;
      padding: 0 0 4px;
    }

    .flip-btn {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      cursor: pointer;
      background: linear-gradient(135deg, #e8a855 0%, #a85e10 100%);
      color: #1a0800;
      box-shadow:
        0 4px 20px rgba(205, 127, 50, 0.3),
        0 1px 0 rgba(255,200,100,0.2) inset;
      transition:
        transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.12s ease,
        opacity 0.2s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .flip-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,220,120,0.18), transparent);
      border-radius: 16px 16px 0 0;
      pointer-events: none;
    }

    .flip-btn:not(:disabled):active {
      transform: scale(0.97) translateY(1px);
      box-shadow: 0 2px 10px rgba(205, 127, 50, 0.2);
    }

    .flip-btn:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .btn-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-coin-icon {
      font-size: 20px;
      line-height: 1;
    }

    /* Suspense dots */
    .suspense-dots {
      display: none;
      gap: 6px;
      align-items: center;
    }

    .suspense-dots.active {
      display: flex;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(26, 8, 0, 0.6);
      animation: dot-bounce 0.9s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    /* Streak badge */
    .streak {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .streak.visible {
      display: flex;
    }

    .streak-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Particle burst */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-fly var(--dur, 1.1s) var(--ease, cubic-bezier(0.25, 0.46, 0.45, 0.94)) forwards;
      opacity: 0;
    }

    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      80%  { opacity: 0.7; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }

    /* Coin shine sweep during flip */
    @keyframes coin-shimmer {
      0%   { opacity: 0; transform: translateX(-120%) rotate(20deg); }
      40%  { opacity: 0.55; }
      100% { opacity: 0; transform: translateX(220%) rotate(20deg); }
    }

    .shimmer {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 120%;
      background: linear-gradient(100deg, transparent 0%, rgba(255,220,120,0.38) 50%, transparent 100%);
      pointer-events: none;
      z-index: 3;
      border-radius: 50%;
      animation: coin-shimmer 0.6s ease-in-out infinite;
    }

    /* Responsive */
    @media (min-height: 700px) {
      .coin-wrapper { width: 200px; height: 200px; }
      .coin-shadow { width: 190px; }
      .coin-char { font-size: 34px; }
    }

    @media (max-height: 600px) {
      .coin-wrapper { width: 140px; height: 140px; }
      .coin-shadow { width: 130px; }
      .coin-char { font-size: 22px; }
      .result-label { font-size: 26px; margin-top: 18px; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div id="app">
    <header>
      <a class="back-btn" href="../">
        <svg viewBox="0 0 10 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 1.5L1.5 8.5L8.5 15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Apps
      </a>
      <h1>古錢擲幣</h1>
      <div class="header-right">
        <button class="reset-btn" id="reset-btn" aria-label="Reset stats">Reset</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-pill stat-heads">
        <div class="stat-label">正面</div>
        <div class="stat-value" id="heads-count">0</div>
      </div>
      <div class="stat-pill" style="flex:0.6">
        <div class="stat-label">總計</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat-pill stat-tails">
        <div class="stat-label">反面</div>
        <div class="stat-value" id="tails-count">0</div>
      </div>
    </div>

    <!-- Coin stage -->
    <div class="coin-stage">
      <div class="coin-wrapper" id="coin-wrapper" role="button" aria-label="Flip coin" tabindex="0">
        <div class="coin" id="coin">
          <!-- HEADS: 開元通寶 (Kaiyuan Tongbao — Tang Dynasty) -->
          <div class="coin-face coin-heads">
            <div class="shimmer" id="shimmer" style="display:none"></div>
            <div class="coin-chars">
              <span class="coin-char coin-char-top">開</span>
              <span class="coin-char coin-char-right">通</span>
              <span class="coin-char coin-char-bottom">元</span>
              <span class="coin-char coin-char-left">寶</span>
              <div class="coin-hole"></div>
            </div>
          </div>
          <!-- TAILS: 天下太平 (Peace Under Heaven) -->
          <div class="coin-face coin-tails">
            <div class="coin-chars">
              <span class="coin-char coin-char-top">天</span>
              <span class="coin-char coin-char-right">太</span>
              <span class="coin-char coin-char-bottom">下</span>
              <span class="coin-char coin-char-left">平</span>
              <div class="coin-hole"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="coin-shadow" id="coin-shadow"></div>

      <div class="result-label" id="result-label">正面</div>

      <div class="streak" id="streak">
        <span class="streak-badge" id="streak-badge">3× 正面</span>
      </div>
    </div>

    <!-- Flip button -->
    <div class="flip-btn-wrap">
      <button class="flip-btn" id="flip-btn" aria-label="Flip coin">
        <span class="btn-label" id="btn-label">
          <span class="btn-coin-icon">🪙</span>
          <span>擲幣</span>
        </span>
        <span class="suspense-dots" id="suspense-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </button>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let stats = { heads: 0, tails: 0 };
    let streak = { side: null, count: 0 };
    let isFlipping = false;
    let currentRotation = 0;
    let lastResult = null;

    // Load saved stats
    try {
      const saved = JSON.parse(localStorage.getItem('coin-flip-stats') || '{}');
      if (saved.heads !== undefined) stats = saved;
      const savedStreak = JSON.parse(localStorage.getItem('coin-flip-streak') || '{}');
      if (savedStreak.side) streak = savedStreak;
      const savedRot = parseFloat(localStorage.getItem('coin-flip-rotation') || '0');
      if (!isNaN(savedRot)) currentRotation = savedRot;
      const savedResult = localStorage.getItem('coin-flip-last');
      if (savedResult) {
        lastResult = savedResult;
        setCoinToResult(savedResult, false);
      }
    } catch (_) {}

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const coinEl       = document.getElementById('coin');
    const coinWrapper  = document.getElementById('coin-wrapper');
    const coinShadow   = document.getElementById('coin-shadow');
    const shimmer      = document.getElementById('shimmer');
    const flipBtn      = document.getElementById('flip-btn');
    const btnLabel     = document.getElementById('btn-label');
    const suspenseDots = document.getElementById('suspense-dots');
    const resultLabel  = document.getElementById('result-label');
    const streakEl     = document.getElementById('streak');
    const streakBadge  = document.getElementById('streak-badge');
    const headsCount   = document.getElementById('heads-count');
    const tailsCount   = document.getElementById('tails-count');
    const totalCount   = document.getElementById('total-count');
    const particles    = document.getElementById('particles');
    const resetBtn     = document.getElementById('reset-btn');

    // ─── Init display ─────────────────────────────────────────────────────────
    updateStatsDisplay(false);
    updateStreakDisplay(false);
    if (lastResult) {
      resultLabel.textContent = lastResult === 'heads' ? '正面' : '反面';
      resultLabel.className = 'result-label visible ' + (lastResult === 'heads' ? 'heads-text' : 'tails-text');
    }

    // ─── Core flip logic ──────────────────────────────────────────────────────
    function flip() {
      if (isFlipping) return;
      isFlipping = true;

      const result = Math.random() < 0.5 ? 'heads' : 'tails';

      resultLabel.classList.remove('visible');
      setTimeout(() => {
        resultLabel.textContent = result === 'heads' ? '正面' : '反面';
        resultLabel.classList.remove('heads-text', 'tails-text');
      }, 200);

      btnLabel.style.display = 'none';
      suspenseDots.classList.add('active');
      flipBtn.disabled = true;

      coinShadow.classList.add('flipping');
      shimmer.style.display = 'block';

      const extraSpins  = 4 + Math.floor(Math.random() * 3);
      const spinDegrees = extraSpins * 360;
      const landingOffset = result === 'heads' ? 0 : 180;
      const baseTarget = currentRotation + spinDegrees;
      const roundedBase = Math.ceil(baseTarget / 360) * 360;
      const finalRotation = roundedBase + landingOffset;

      const phase1Target = currentRotation + spinDegrees * 0.7;
      coinEl.style.transition = `transform ${1.35}s cubic-bezier(0.2, 0.0, 0.6, 1.0)`;
      coinEl.style.transform = `rotateY(${phase1Target}deg)`;

      document.body.classList.remove('result-heads', 'result-tails');

      setTimeout(() => {
        coinEl.style.transition = `transform 0.95s cubic-bezier(0.16, 1, 0.3, 1)`;
        coinEl.style.transform = `rotateY(${finalRotation}deg)`;
        currentRotation = finalRotation;

        setTimeout(() => {
          isFlipping = false;
          shimmer.style.display = 'none';
          coinShadow.classList.remove('flipping');

          stats[result]++;
          lastResult = result;
          updateStreak(result);
          saveState();
          updateStatsDisplay(true, result);

          resultLabel.classList.add('visible', result === 'heads' ? 'heads-text' : 'tails-text');
          document.body.classList.add(result === 'heads' ? 'result-heads' : 'result-tails');
          burstParticles(result);

          btnLabel.style.display = 'flex';
          suspenseDots.classList.remove('active');
          flipBtn.disabled = false;

        }, 980);
      }, 1380);
    }

    // ─── Set coin face without animation ──────────────────────────────────────
    function setCoinToResult(result, animate) {
      const target = result === 'heads' ? currentRotation : currentRotation + 180;
      if (!animate) {
        coinEl.style.transition = 'none';
        coinEl.style.transform = `rotateY(${target}deg)`;
      }
    }

    // ─── Stats ────────────────────────────────────────────────────────────────
    function updateStatsDisplay(animate, changedSide) {
      const total = stats.heads + stats.tails;
      headsCount.textContent = stats.heads;
      tailsCount.textContent = stats.tails;
      totalCount.textContent = total;

      if (animate && changedSide) {
        const el = changedSide === 'heads' ? headsCount : tailsCount;
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 300);
      }
    }

    // ─── Streak ───────────────────────────────────────────────────────────────
    function updateStreak(result) {
      if (streak.side === result) {
        streak.count++;
      } else {
        streak.side = result;
        streak.count = 1;
      }
      updateStreakDisplay(true);
    }

    function updateStreakDisplay(animate) {
      if (streak.count >= 2) {
        const label = streak.side === 'heads' ? '正面' : '反面';
        streakBadge.textContent = `${streak.count}× ${label} 連續`;
        streakEl.classList.add('visible');
        if (animate) {
          streakEl.style.transform = 'scale(1.15)';
          setTimeout(() => streakEl.style.transform = '', 250);
        }
      } else {
        streakEl.classList.remove('visible');
      }
    }

    // ─── Reset ────────────────────────────────────────────────────────────────
    function resetStats() {
      if (isFlipping) return;
      stats = { heads: 0, tails: 0 };
      streak = { side: null, count: 0 };
      lastResult = null;
      saveState();
      updateStatsDisplay(false);
      updateStreakDisplay(false);
      resultLabel.classList.remove('visible');
      document.body.classList.remove('result-heads', 'result-tails');
    }

    // ─── Particle burst ───────────────────────────────────────────────────────
    function burstParticles(result) {
      const colors = result === 'heads'
        ? ['#e8a855', '#cd7f32', '#f5d88a', '#a85e10', '#f7e4a0']
        : ['#7aaa88', '#4a7c5a', '#b8d4b0', '#5a9a6a', '#d0ead8'];

      const count = 22;
      const rect  = coinWrapper.getBoundingClientRect();
      const cx    = rect.left + rect.width / 2;
      const cy    = rect.top + rect.height / 2;

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 5 + Math.random() * 9;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const dist  = 80 + Math.random() * 100;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist - 60;
        const dur   = 0.8 + Math.random() * 0.5;
        const color = colors[Math.floor(Math.random() * colors.length)];

        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${cx}px;
          top: ${cy}px;
          background: ${color};
          box-shadow: 0 0 ${size}px ${color}88;
          --tx: ${tx}px;
          --ty: ${ty}px;
          --dur: ${dur}s;
          margin-left: ${-size / 2}px;
          margin-top: ${-size / 2}px;
        `;
        particles.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000 + 100);
      }
    }

    // ─── Persist ──────────────────────────────────────────────────────────────
    function saveState() {
      try {
        localStorage.setItem('coin-flip-stats', JSON.stringify(stats));
        localStorage.setItem('coin-flip-streak', JSON.stringify(streak));
        localStorage.setItem('coin-flip-rotation', String(currentRotation));
        localStorage.setItem('coin-flip-last', lastResult || '');
      } catch (_) {}
    }

    // ─── Events ───────────────────────────────────────────────────────────────
    flipBtn.addEventListener('click', flip);
    coinWrapper.addEventListener('click', flip);
    coinWrapper.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }
    });
    resetBtn.addEventListener('click', resetStats);

    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
