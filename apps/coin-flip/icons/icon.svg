<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="coinGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#fff9d6"/>
      <stop offset="18%"  stop-color="#f5c842"/>
      <stop offset="55%"  stop-color="#c8900a"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <!-- Coin body -->
  <circle cx="50" cy="50" r="38" fill="url(#coinGrad)"/>
  <!-- Rim ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,240,140,0.35)" stroke-width="2"/>
  <!-- Shine -->
  <ellipse cx="40" cy="36" rx="14" ry="10" fill="rgba(255,255,220,0.25)" transform="rotate(-20 40 36)"/>
  <!-- Eagle emoji text (approximate with text) -->
  <text x="50" y="62" text-anchor="middle" font-size="36" font-family="sans-serif">🦅</text>
</svg>
