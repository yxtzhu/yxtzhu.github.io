<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#5e5ce6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="0" fill="url(#bg)"/>
  <!-- 3x3 grid of rounded squares representing app icons -->
  <rect x="22" y="22" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.9"/>
  <rect x="71" y="22" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.75"/>
  <rect x="120" y="22" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.6"/>
  <rect x="22" y="71" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.75"/>
  <rect x="71" y="71" width="38" height="38" rx="9" fill="url(#dot)" opacity="1"/>
  <rect x="120" y="71" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.75"/>
  <rect x="22" y="120" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.6"/>
  <rect x="71" y="120" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.75"/>
  <rect x="120" y="120" width="38" height="38" rx="9" fill="url(#dot)" opacity="0.9"/>
</svg>
