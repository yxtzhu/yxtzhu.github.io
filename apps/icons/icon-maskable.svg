<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#5e5ce6"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable (safe zone is center 80%) -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <!-- Grid shifted into safe zone (safe zone: 18px–162px each side) -->
  <rect x="30" y="30" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.9"/>
  <rect x="74" y="30" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.75"/>
  <rect x="118" y="30" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.6"/>
  <rect x="30" y="74" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.75"/>
  <rect x="74" y="74" width="32" height="32" rx="7" fill="url(#dot)" opacity="1"/>
  <rect x="118" y="74" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.75"/>
  <rect x="30" y="118" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.6"/>
  <rect x="74" y="118" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.75"/>
  <rect x="118" y="118" width="32" height="32" rx="7" fill="url(#dot)" opacity="0.9"/>
</svg>
