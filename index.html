<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tingting Zhu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&family=Noto+Serif+JP:wght@200;300;400&display=swap');

:root {
  --ink: #e8e5e0;
  --ink-soft: #b8b5b0;
  --ink-faint: #7a7a72;
  --ink-ghost: #3a3a38;
  --paper: #1a1a18;
  --accent: #7a8b7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.breath {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 48px;
  position: relative;
}

.breath-content {
  max-width: 700px;
  width: 100%;
}

/* Cursor */
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--ink-faint);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: cursorBlink 0.85s step-end infinite;
}
.typing-cursor.serif { height: 0.85em; }
.typing-cursor.hidden { opacity: 0; animation: none; }

@keyframes cursorBlink {
  50% { opacity: 0; }
}

/* === Hero === */
.name-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(56px, 10vw, 120px);
  font-weight: 300;
  letter-spacing: -2px;
  line-height: 1;
  color: var(--ink);
  min-height: 1.1em;
}
.name-main .typing-cursor { height: 0.8em; width: 3px; background: var(--ink-ghost); }
.name-role {
  font-size: 14px;
  font-weight: 300;
  color: var(--ink-faint);
  margin-top: 28px;
  letter-spacing: 3px;
  text-transform: uppercase;
  min-height: 1.5em;
}

/* === Philosophy === */
.philosophy {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink-soft);
  text-align: center;
  max-width: 560px;
  margin: 0 auto;
  min-height: 8em;
}
.philosophy em {
  font-style: italic;
  color: var(--ink);
}
.philosophy .typing-cursor { background: var(--ink-ghost); }

/* === Divider === */
.divider-wrap { text-align: center; }
.divider {
  width: 1px;
  height: 0;
  background: var(--ink-ghost);
  margin: 0 auto;
  opacity: 0.3;
  transition: height 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.divider.grown { height: 80px; }

/* === Projects === */
.project-number {
  font-size: 11px;
  color: var(--ink-ghost);
  letter-spacing: 4px;
  margin-bottom: 40px;
  text-align: center;
  min-height: 1.5em;
}
.project-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 16px;
  letter-spacing: -1px;
  text-align: center;
  min-height: 1.2em;
  cursor: pointer;
  transition: color 0.6s;
}
.project-name:hover { color: var(--accent); }
.project-name .typing-cursor { width: 3px; background: var(--ink-ghost); }
.project-type {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-faint);
  text-align: center;
  letter-spacing: 1px;
  min-height: 1.5em;
}

/* === Contact === */
.contact-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 48px;
  letter-spacing: -1px;
  text-align: center;
  min-height: 1.2em;
}
.contact-heading .typing-cursor { width: 3px; background: var(--ink-ghost); }
.contact-secondary {
  display: flex;
  gap: 32px;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s;
}
.contact-secondary.visible { opacity: 1; }
.contact-secondary a {
  font-size: 13px;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.4s;
}
.contact-secondary a:hover { color: var(--ink); }

/* Seal */
.seal {
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 120px auto 60px;
  opacity: 0;
  transition: opacity 0.8s;
}
.seal.visible { opacity: 0.55; }
.seal:hover { opacity: 1; }
.seal img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: invert(0.8);
}

/* Side dots */
.side-progress {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.side-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink-ghost);
  transition: all 0.5s;
  cursor: pointer;
}
.side-dot.active {
  background: var(--ink-soft);
  transform: scale(1.8);
}

/* Page counter */
.page-counter {
  position: fixed;
  bottom: 40px;
  right: 40px;
  font-size: 11px;
  color: var(--ink-ghost);
  z-index: 100;
  font-weight: 300;
  letter-spacing: 2px;
}

/* Scroll cue */
.scroll-cue {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  opacity: 0.25;
  transition: opacity 1s;
}
.scroll-cue.hidden { opacity: 0; }
.scroll-cue-line {
  width: 1px;
  height: 32px;
  background: var(--ink-ghost);
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scaleY(1); opacity: 0.3; }
  50% { transform: scaleY(1.4); opacity: 0.7; }
}

/* Particles */
#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Ensure content layers above particles */
.breath { position: relative; z-index: 1; }

@media (max-width: 640px) {
  .breath { padding: 60px 28px; }
  .side-progress { right: 12px; }
  .contact-secondary { flex-direction: column; align-items: center; gap: 16px; }
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div class="scroll-cue" id="scrollCue">
  <div class="scroll-cue-line"></div>
</div>

<div class="side-progress" id="sideDots"></div>
<div class="page-counter" id="pageCounter">01 / 06</div>

<!-- 1: Name -->
<section class="breath" data-section="0">
  <div class="breath-content">
    <h1 class="name-main" id="heroName"></h1>
    <p class="name-role" id="heroRole"></p>
  </div>
</section>

<!-- 2: Philosophy -->
<section class="breath" data-section="1">
  <div class="breath-content">
    <p class="philosophy" id="philosophy"></p>
  </div>
</section>

<!-- 3: Divider -->
<section class="breath" data-section="2" style="min-height: 40vh;">
  <div class="breath-content divider-wrap">
    <div class="divider" id="divider"></div>
  </div>
</section>

<!-- 4: Project 1 -->
<section class="breath" data-section="3">
  <div class="breath-content" style="text-align:center;">
    <div class="project-number" id="pNum1"></div>
    <h2 class="project-name" id="pName1"></h2>
    <p class="project-type" id="pType1"></p>
  </div>
</section>

<!-- 5: Project 2 -->
<section class="breath" data-section="4">
  <div class="breath-content" style="text-align:center;">
    <div class="project-number" id="pNum2"></div>
    <h2 class="project-name" id="pName2"></h2>
    <p class="project-type" id="pType2"></p>
  </div>
</section>

<!-- 6: Contact -->
<section class="breath" data-section="5">
  <div class="breath-content" style="text-align:center;">
    <h2 class="contact-heading" id="contactHeading"></h2>
    <div class="contact-secondary" id="contactLinks">
      <a href="https://github.com/yxtzhu">GitHub</a>
      <a href="https://www.linkedin.com/in/tingting-zhu-99aa015a/">LinkedIn</a>
    </div>
    <div class="seal" id="seal">
      <img src="assets/img/IMG_0598.png" alt="seal">
    </div>
  </div>
</section>

<script>
// === Typing Engine ===
class Typewriter {
  constructor(element, options = {}) {
    this.el = element;
    this.speed = options.speed || 55;
    this.variance = options.variance || 25;
    this.pauseOnComma = options.pauseOnComma || 120;
    this.pauseOnPeriod = options.pauseOnPeriod || 250;
    this.pauseOnNewline = options.pauseOnNewline || 300;
    this.cursorClass = options.cursorClass || '';
    this.onComplete = options.onComplete || null;
    this.started = false;
    this.finished = false;
  }

  async type(text) {
    if (this.started) return;
    this.started = true;

    const cursor = document.createElement('span');
    cursor.className = `typing-cursor ${this.cursorClass}`;
    this.el.appendChild(cursor);

    for (let i = 0; i < text.length; i++) {
      const char = text[i];

      if (char === '\n') {
        this.el.insertBefore(document.createElement('br'), cursor);
        await this.sleep(this.pauseOnNewline);
        continue;
      }

      if (text.substring(i, i + 4) === '<em>') {
        const endIdx = text.indexOf('</em>', i);
        if (endIdx !== -1) {
          const emText = text.substring(i + 4, endIdx);
          const em = document.createElement('em');
          this.el.insertBefore(em, cursor);
          for (const c of emText) {
            em.textContent += c;
            await this.sleep(this.speed + (Math.random() - 0.5) * this.variance);
          }
          i = endIdx + 4;
          continue;
        }
      }

      const textNode = document.createTextNode(char);
      this.el.insertBefore(textNode, cursor);

      let delay = this.speed + (Math.random() - 0.5) * this.variance;
      if (char === ',') delay += this.pauseOnComma;
      if (char === '.' || char === '—') delay += this.pauseOnPeriod;

      await this.sleep(delay);
    }

    this.finished = true;
    setTimeout(() => { cursor.classList.add('hidden'); }, 1500);
    if (this.onComplete) this.onComplete();
  }

  sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
}

// === Section Definitions ===
const sections = [
  // 0: Hero
  {
    init: (done) => {
      const nameTyper = new Typewriter(document.getElementById('heroName'), {
        speed: 90, variance: 40, cursorClass: 'serif',
        onComplete: () => {
          const roleTyper = new Typewriter(document.getElementById('heroRole'), {
            speed: 45, variance: 20, onComplete: done
          });
          setTimeout(() => roleTyper.type('Product Manager · Ceramicist'), 400);
        }
      });
      nameTyper.type('Tingting\nZhu');
    }
  },
  // 1: Philosophy
  {
    init: (done) => {
      const typer = new Typewriter(document.getElementById('philosophy'), {
        speed: 40, variance: 15, cursorClass: 'serif', onComplete: done
      });
      typer.type('The space between things\nis where meaning lives.\n\nI like to solve interesting problems\nwith <em>passionate people</em>.');
    }
  },
  // 2: Divider
  {
    init: (done) => {
      setTimeout(() => {
        document.getElementById('divider').classList.add('grown');
        setTimeout(done, 800);
      }, 300);
    }
  },
  // 3: Project 1
  {
    init: (done) => {
      typeProject('pNum1', '001', 'pName1', 'Web Apps', 'pType1', '—', done);
    }
  },
  // 4: Project 2
  {
    init: (done) => {
      typeProject('pNum2', '002', 'pName2', 'Kiln', 'pType2', '—', done);
    }
  },
  // 5: Contact
  {
    init: (done) => {
      const typer = new Typewriter(document.getElementById('contactHeading'), {
        speed: 70, variance: 30, cursorClass: 'serif',
        onComplete: () => {
          setTimeout(() => {
            document.getElementById('contactLinks').classList.add('visible');
            setTimeout(() => {
              document.getElementById('seal').classList.add('visible');
              done();
            }, 400);
          }, 300);
        }
      });
      typer.type('Say hello');
    }
  },
];

function typeProject(numId, numText, nameId, nameText, typeId, typeText, done) {
  const numTyper = new Typewriter(document.getElementById(numId), {
    speed: 60, variance: 20,
    onComplete: () => {
      setTimeout(() => {
        const nameTyper = new Typewriter(document.getElementById(nameId), {
          speed: 65, variance: 25, cursorClass: 'serif',
          onComplete: () => {
            setTimeout(() => {
              const typeTyper = new Typewriter(document.getElementById(typeId), {
                speed: 35, variance: 15, onComplete: done
              });
              typeTyper.type(typeText);
            }, 200);
          }
        });
        nameTyper.type(nameText);
      }, 200);
    }
  });
  numTyper.type(numText);
}

// === Scroll-triggered typing ===
const breathEls = document.querySelectorAll('.breath');
const triggered = new Set();
const total = breathEls.length;

const sideDots = document.getElementById('sideDots');
breathEls.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'side-dot';
  dot.onclick = () => breathEls[i].scrollIntoView({ behavior: 'smooth' });
  sideDots.appendChild(dot);
});
const dots = document.querySelectorAll('.side-dot');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const idx = parseInt(entry.target.dataset.section);

    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    document.getElementById('pageCounter').textContent =
      `${String(idx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

    if (idx > 0) document.getElementById('scrollCue').classList.add('hidden');

    if (!triggered.has(idx) && sections[idx]) {
      triggered.add(idx);
      sections[idx].init(() => {});
    }
  });
}, { threshold: 0.45 });

breathEls.forEach(b => observer.observe(b));

setTimeout(() => {
  if (!triggered.has(0)) {
    triggered.add(0);
    dots[0]?.classList.add('active');
    sections[0].init(() => {});
  }
}, 400);
</script>

<script src="//cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 40, density: { enable: true, value_area: 900 } },
    color: { value: "#3a3a38" },
    shape: { type: "circle" },
    opacity: { value: 0.6, random: true, anim: { enable: false } },
    size: { value: 2, random: true, anim: { enable: false } },
    line_linked: {
      enable: true,
      distance: 160,
      color: "#3a3a38",
      opacity: 0.35,
      width: 1
    },
    move: {
      enable: true,
      speed: 1.2,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false
    }
  },
  interactivity: {
    detect_on: "window",
    events: {
      onhover: { enable: true, mode: "grab" },
      onclick: { enable: true, mode: "push" },
      resize: true
    },
    modes: {
      grab: { distance: 180, line_linked: { opacity: 0.6 } },
      push: { particles_nb: 3 }
    }
  },
  retina_detect: true
});
</script>

</body>
</html>
