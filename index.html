<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tingting Zhu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&family=Noto+Serif+JP:wght@200;300;400&display=swap');

:root {
  --ink: #e8e5e0;
  --ink-soft: #b8b5b0;
  --ink-faint: #7a7a72;
  --ink-ghost: #3a3a38;
  --paper: #1a1a18;
  --accent: #7a8b7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.breath {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 48px;
  position: relative;
}

.breath-content {
  max-width: 700px;
  width: 100%;
}

/* Cursor */
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--ink-faint);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: cursorBlink 0.85s step-end infinite;
}
.typing-cursor.serif { height: 0.85em; }
.typing-cursor.hidden { opacity: 0; animation: none; }

@keyframes cursorBlink {
  50% { opacity: 0; }
}

/* === Hero === */
.name-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(56px, 10vw, 120px);
  font-weight: 300;
  letter-spacing: -2px;
  line-height: 1;
  color: var(--ink);
  min-height: 1.1em;
}
.name-main .typing-cursor { height: 0.8em; width: 3px; background: var(--ink-ghost); }
.name-role {
  font-size: 14px;
  font-weight: 300;
  color: var(--ink-faint);
  margin-top: 28px;
  letter-spacing: 3px;
  text-transform: uppercase;
  min-height: 1.5em;
}

/* === Philosophy === */
.philosophy {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink-soft);
  text-align: center;
  max-width: 560px;
  margin: 0 auto;
  min-height: 8em;
}
.philosophy em {
  font-style: italic;
  color: var(--ink);
}
.philosophy .typing-cursor { background: var(--ink-ghost); }

/* === Divider === */
.divider-wrap { text-align: center; }
.divider {
  width: 1px;
  height: 0;
  background: var(--ink-ghost);
  margin: 0 auto;
  opacity: 0.3;
  transition: height 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.divider.grown { height: 80px; }

/* === Projects === */
.project-number {
  font-size: 11px;
  color: var(--ink-ghost);
  letter-spacing: 4px;
  margin-bottom: 40px;
  text-align: center;
  min-height: 1.5em;
}
.project-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 16px;
  letter-spacing: -1px;
  text-align: center;
  min-height: 1.2em;
  cursor: pointer;
  transition: color 0.6s;
}
.project-name:hover { color: var(--accent); }
.project-name .typing-cursor { width: 3px; background: var(--ink-ghost); }
.project-type {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-faint);
  text-align: center;
  letter-spacing: 1px;
  min-height: 1.5em;
}

/* === Contact === */
.contact-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 48px;
  letter-spacing: -1px;
  text-align: center;
  min-height: 1.2em;
}
.contact-heading .typing-cursor { width: 3px; background: var(--ink-ghost); }
.contact-secondary {
  display: flex;
  gap: 32px;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s;
}
.contact-secondary.visible { opacity: 1; }
.contact-secondary a {
  font-size: 13px;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.4s;
}
.contact-secondary a:hover { color: var(--ink); }

/* Seal */
.seal {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 120px auto 60px;
  opacity: 0;
  transition: opacity 0.8s;
}
.seal.visible { opacity: 0.55; }
.seal:hover { opacity: 1; }
.seal img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: invert(0.8);
}

/* Side dots */
.side-progress {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.side-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink-ghost);
  transition: all 0.5s;
  cursor: pointer;
}
.side-dot.active {
  background: var(--ink-soft);
  transform: scale(1.8);
}

/* Page counter */
.page-counter {
  position: fixed;
  bottom: 40px;
  right: 40px;
  font-size: 11px;
  color: var(--ink-ghost);
  z-index: 100;
  font-weight: 300;
  letter-spacing: 2px;
}

/* Scroll cue */
.scroll-cue {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  opacity: 0.25;
  transition: opacity 1s;
}
.scroll-cue.hidden { opacity: 0; }
.scroll-cue-line {
  width: 1px;
  height: 32px;
  background: var(--ink-ghost);
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scaleY(1); opacity: 0.3; }
  50% { transform: scaleY(1.4); opacity: 0.7; }
}

/* Particles */
#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Ensure content layers above particles */
.breath { position: relative; z-index: 1; }

@media (max-width: 640px) {
  .breath { padding: 60px 28px; }
  .side-progress { right: 12px; }
  .contact-secondary { flex-direction: column; align-items: center; gap: 16px; }
}

/* ─── Pottery Gallery ─── */
.gallery-section {
  display: block;
  min-height: unset;
  padding: 0 0 64px;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.gallery-section.gallery-visible { opacity: 1; transform: translateY(0); }

.gallery-hdr {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 48px 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
}
.gallery-hdr h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.gallery-hdr h3 em { font-style: normal; color: var(--ink-faint); font-weight: 300; }

.gallery-ctrls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.g-piece-counter {
  font-size: 0.78rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  min-width: 52px;
  text-align: right;
}
.gallery-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid var(--ink-ghost);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
  color: var(--ink-soft);
  flex-shrink: 0;
}
.gallery-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--paper); }
.gallery-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
.gallery-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.gallery-prog { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
.gallery-prog-bg { width: 100%; height: 1px; background: var(--ink-ghost); border-radius: 1px; overflow: hidden; }
.gallery-prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

.gallery-scroll-wrap {
  width: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 12px 0 0;
}
.gallery-scroll-wrap::-webkit-scrollbar { display: none; }

.gallery-track {
  display: flex;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.gallery-track.is-dragging { cursor: grabbing; }

.gallery-card {
  flex: 0 0 100vw;
  width: 100vw;
  height: 76vh;
  overflow: hidden;
  position: relative;
  background: #212120;
  scroll-snap-align: start;
}
.gallery-card img { width: 100%; height: 100%; display: block; transition: transform 0.8s ease; }
.gallery-card:hover img { transform: scale(1.012); }
.gallery-card img.g-cover { object-fit: cover; }
.gallery-card img.g-contain { object-fit: contain; background: #1c1c1b; }

.gallery-card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 100px 48px 36px;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.35) 55%, transparent 100%);
  pointer-events: none;
}
.gallery-card-info .g-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400; font-size: 1.9rem;
  color: #fff; line-height: 1.2; margin-bottom: 5px;
}
.gallery-card-info .g-material {
  font-size: 0.75rem; font-weight: 300;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.gallery-end-card {
  flex: 0 0 100vw; width: 100vw; height: 76vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: var(--paper);
  scroll-snap-align: start;
}
.gallery-end-orn { width: 36px; height: 1px; background: var(--ink-ghost); }
.gallery-end-card p {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: clamp(1.4rem, 2.5vw, 2rem);
  color: var(--ink-faint); letter-spacing: -0.01em;
}
.gallery-end-card p em { font-style: italic; color: var(--ink-soft); }

/* Pottery Lightbox */
.g-lightbox {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(8,8,8,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.g-lightbox.active { opacity: 1; pointer-events: all; }
.g-lb-content {
  max-width: 90vw; max-height: 90vh;
  transform: scale(0.93) translateY(10px);
  transition: transform 0.4s ease;
  text-align: center;
}
.g-lightbox.active .g-lb-content { transform: scale(1) translateY(0); }
.g-lb-content img { max-width: 90vw; max-height: 74vh; object-fit: contain; display: block; margin: 0 auto; }
.g-lb-info { margin-top: 16px; }
.g-lb-info .g-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 1.45rem; color: var(--ink); margin-bottom: 4px; }
.g-lb-info .g-material { font-size: 0.7rem; font-weight: 300; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-faint); }
.g-lb-close {
  position: fixed; top: 24px; right: 24px;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--ink-ghost); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft); transition: all 0.3s ease; z-index: 1001;
}
.g-lb-close:hover { border-color: var(--ink-soft); background: rgba(255,255,255,0.06); }
.g-lb-close svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
.g-lb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--ink-ghost); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft); transition: all 0.3s ease; z-index: 1001;
}
.g-lb-nav:hover { border-color: var(--ink-soft); background: rgba(255,255,255,0.06); }
.g-lb-nav.prev { left: 20px; }
.g-lb-nav.next { right: 20px; }
.g-lb-nav svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

@media (max-width: 768px) {
  .gallery-hdr { padding: 16px 24px 16px; }
  .gallery-prog { padding: 0 24px; }
  .gallery-card-info { padding: 80px 24px 28px; }
  .gallery-card-info .g-title { font-size: 1.45rem; }
  .gallery-card, .gallery-end-card { height: 65vh; }
}
@media (max-width: 480px) {
  .gallery-hdr { flex-direction: column; align-items: flex-start; gap: 12px; padding: 14px 20px 12px; }
  .gallery-ctrls { align-self: stretch; justify-content: space-between; }
  .gallery-prog { padding: 0 20px; }
  .gallery-card-info { padding: 60px 20px 24px; }
  .gallery-card-info .g-title { font-size: 1.25rem; }
  .gallery-card, .gallery-end-card { height: 55vh; }
}
</style>

<script>
// === Typing Engine ===
class Typewriter {
  constructor(element, options = {}) {
    this.el = element;
    this.speed = options.speed || 55;
    this.variance = options.variance || 25;
    this.pauseOnComma = options.pauseOnComma || 120;
    this.pauseOnPeriod = options.pauseOnPeriod || 250;
    this.pauseOnNewline = options.pauseOnNewline || 300;
    this.cursorClass = options.cursorClass || '';
    this.onComplete = options.onComplete || null;
    this.started = false;
    this.finished = false;
  }

  async type(text) {
    if (this.started) return;
    this.started = true;

    const cursor = document.createElement('span');
    cursor.className = `typing-cursor ${this.cursorClass}`;
    this.el.appendChild(cursor);

    for (let i = 0; i < text.length; i++) {
      const char = text[i];

      if (char === '\n') {
        this.el.insertBefore(document.createElement('br'), cursor);
        await this.sleep(this.pauseOnNewline);
        continue;
      }

      if (text.substring(i, i + 4) === '<em>') {
        const endIdx = text.indexOf('</em>', i);
        if (endIdx !== -1) {
          const emText = text.substring(i + 4, endIdx);
          const em = document.createElement('em');
          this.el.insertBefore(em, cursor);
          for (const c of emText) {
            em.textContent += c;
            await this.sleep(this.speed + (Math.random() - 0.5) * this.variance);
          }
          i = endIdx + 4;
          continue;
        }
      }

      const textNode = document.createTextNode(char);
      this.el.insertBefore(textNode, cursor);

      let delay = this.speed + (Math.random() - 0.5) * this.variance;
      if (char === ',') delay += this.pauseOnComma;
      if (char === '.' || char === '—') delay += this.pauseOnPeriod;

      await this.sleep(delay);
    }

    this.finished = true;
    setTimeout(() => { cursor.classList.add('hidden'); }, 1500);
    if (this.onComplete) this.onComplete();
  }

  sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
}

// === Section Definitions ===
const sections = [
  // 0: Hero
  {
    init: (done) => {
      const nameTyper = new Typewriter(document.getElementById('heroName'), {
        speed: 90, variance: 40, cursorClass: 'serif',
        onComplete: () => {
          const roleTyper = new Typewriter(document.getElementById('heroRole'), {
            speed: 45, variance: 20, onComplete: done
          });
          setTimeout(() => roleTyper.type('Product Manager · Ceramicist'), 400);
        }
      });
      nameTyper.type('Tingting\nZhu');
    }
  },
  // 1: Philosophy
  {
    init: (done) => {
      const typer = new Typewriter(document.getElementById('philosophy'), {
        speed: 40, variance: 15, cursorClass: 'serif', onComplete: done
      });
      typer.type('The space between things\nis where meaning lives.\n\nI like to solve interesting problems\nwith <em>passionate people</em>.');
    }
  },
  // 2: Divider
  {
    init: (done) => {
      setTimeout(() => {
        document.getElementById('divider').classList.add('grown');
        setTimeout(done, 800);
      }, 300);
    }
  },
  // 3: Project 1
  {
    init: (done) => {
      typeProject('pNum1', '001', 'pName1', 'Web Apps', 'pType1', '—', done);
    }
  },
  // 4: Project 2
  {
    init: (done) => {
      typeProject('pNum2', '002', 'pName2', 'Kiln', 'pType2', '—', done);
    }
  },
  // 5: Gallery
  {
    init: (done) => {
      document.querySelector('.gallery-section').classList.add('gallery-visible');
      done();
    }
  },
  // 6: Contact
  {
    init: (done) => {
      const typer = new Typewriter(document.getElementById('contactHeading'), {
        speed: 70, variance: 30, cursorClass: 'serif',
        onComplete: () => {
          setTimeout(() => {
            document.getElementById('contactLinks').classList.add('visible');
            setTimeout(() => {
              document.getElementById('seal').classList.add('visible');
              done();
            }, 400);
          }, 300);
        }
      });
      typer.type('Say hello');
    }
  },
];

function typeProject(numId, numText, nameId, nameText, typeId, typeText, done) {
  const numTyper = new Typewriter(document.getElementById(numId), {
    speed: 60, variance: 20,
    onComplete: () => {
      setTimeout(() => {
        const nameTyper = new Typewriter(document.getElementById(nameId), {
          speed: 65, variance: 25, cursorClass: 'serif',
          onComplete: () => {
            setTimeout(() => {
              const typeTyper = new Typewriter(document.getElementById(typeId), {
                speed: 35, variance: 15, onComplete: done
              });
              typeTyper.type(typeText);
            }, 200);
          }
        });
        nameTyper.type(nameText);
      }, 200);
    }
  });
  numTyper.type(numText);
}

// === Scroll-triggered typing ===
const breathEls = document.querySelectorAll('.breath');
const triggered = new Set();
const total = breathEls.length;

const sideDots = document.getElementById('sideDots');
breathEls.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'side-dot';
  dot.onclick = () => breathEls[i].scrollIntoView({ behavior: 'smooth' });
  sideDots.appendChild(dot);
});
const dots = document.querySelectorAll('.side-dot');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const idx = parseInt(entry.target.dataset.section);

    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    document.getElementById('pageCounter').textContent =
      `${String(idx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

    if (idx > 0) document.getElementById('scrollCue').classList.add('hidden');

    if (!triggered.has(idx) && sections[idx]) {
      triggered.add(idx);
      sections[idx].init(() => {});
    }
  });
}, { threshold: 0.45 });

breathEls.forEach(b => observer.observe(b));

setTimeout(() => {
  if (!triggered.has(0)) {
    triggered.add(0);
    dots[0]?.classList.add('active');
    sections[0].init(() => {});
  }
}, 400);
</script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// POTTERY GALLERY — edit this array to add or remove pieces
//
//   1. Drop your photo files into the /pottery/ folder in this repo
//   2. Add a new entry to the array below:
//      { title: 'Piece name', material: 'Clay type, glaze', img: 'pottery/filename.jpg' }
//   3. Delete an entry to remove it from the gallery
//
// The image will auto-detect portrait vs. landscape — no extra config needed.
// ─────────────────────────────────────────────────────────────────────────────
const galleryPieces = [
  // Replace these placeholder images with your own (e.g. 'pottery/vase-01.jpg')
  { title: 'Quiet Morning',     material: 'Stoneware, ash glaze',        img: 'https://picsum.photos/seed/pot1/600/800' },
  { title: 'River Stone Bowl',  material: 'Porcelain, celadon glaze',    img: 'https://picsum.photos/seed/pot2/900/600' },
  { title: 'Whispered Earth',   material: 'Red clay, unglazed',          img: 'https://picsum.photos/seed/pot3/600/750' },
  { title: 'Tidal Pool',        material: 'Stoneware, copper carbonate', img: 'https://picsum.photos/seed/pot4/800/600' },
  { title: 'Winter Kiln No. 3', material: 'Wood-fired stoneware',        img: 'https://picsum.photos/seed/pot5/650/650' },
  { title: 'Still Water',       material: 'Porcelain, tenmoku glaze',    img: 'https://picsum.photos/seed/pot8/620/780' },
];

(function () {
  const gTrack    = document.getElementById('gTrack');
  const gWrap     = document.getElementById('gScrollWrap');
  const gCounter  = document.getElementById('gCounter');
  const gProgFill = document.getElementById('gProgFill');
  const gPrev     = document.getElementById('gPrev');
  const gNext     = document.getElementById('gNext');
  const gLightbox = document.getElementById('gLightbox');
  const gLbImg    = document.getElementById('gLbImg');
  const gLbTitle  = document.getElementById('gLbTitle');
  const gLbMat    = document.getElementById('gLbMaterial');

  const total = galleryPieces.length;
  let current = 0;
  let lbIndex = -1;

  // Build cards
  galleryPieces.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.innerHTML = `
      <img src="${p.img}" alt="${p.title}" class="g-cover" loading="lazy">
      <div class="gallery-card-info">
        <div class="g-title">${p.title}</div>
        <div class="g-material">${p.material}</div>
      </div>`;
    const img = card.querySelector('img');
    img.addEventListener('load', function () {
      this.className = this.naturalWidth > this.naturalHeight * 1.15 ? 'g-contain' : 'g-cover';
    });
    card.addEventListener('click', () => { if (!gWasDragged) openLb(i); });
    gTrack.appendChild(card);
  });

  // End card
  const endCard = document.createElement('div');
  endCard.className = 'gallery-end-card';
  endCard.innerHTML = '<div class="gallery-end-orn"></div><p>made with <em>intention</em></p>';
  gTrack.appendChild(endCard);

  gCounter.textContent = `1\u2009/\u2009${total}`;

  // Scroll & progress
  function gUpdateUI() {
    const maxScroll = gWrap.scrollWidth - gWrap.clientWidth;
    const sl = gWrap.scrollLeft;
    gProgFill.style.width = (maxScroll > 0 ? Math.min(sl / maxScroll, 1) * 100 : 0) + '%';
    current = Math.max(0, Math.min(Math.round(sl / window.innerWidth), total - 1));
    gCounter.textContent = `${current + 1}\u2009/\u2009${total}`;
    gPrev.disabled = sl <= 2;
    gNext.disabled = sl >= maxScroll - 2;
  }
  gWrap.addEventListener('scroll', gUpdateUI, { passive: true });
  window.addEventListener('resize', gUpdateUI);

  function gScrollTo(idx) {
    gWrap.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
  }
  gPrev.addEventListener('click', () => gScrollTo(Math.max(0, current - 1)));
  gNext.addEventListener('click', () => gScrollTo(Math.min(total, current + 1)));

  // Drag to scroll
  let gDragging = false, gWasDragged = false, gStartX = 0, gScrollStart = 0;
  const DRAG_THRESH = 8;
  gTrack.addEventListener('mousedown', e => {
    gDragging = true; gWasDragged = false;
    gStartX = e.pageX; gScrollStart = gWrap.scrollLeft;
    gTrack.classList.add('is-dragging');
    gWrap.style.scrollSnapType = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!gDragging) return;
    if (Math.abs(e.pageX - gStartX) > DRAG_THRESH) gWasDragged = true;
    gWrap.scrollLeft = gScrollStart - (e.pageX - gStartX);
  });
  document.addEventListener('mouseup', () => {
    if (!gDragging) return;
    gDragging = false;
    gTrack.classList.remove('is-dragging');
    gWrap.style.scrollSnapType = 'x mandatory';
    setTimeout(() => { gWasDragged = false; }, 20);
  });

  // Touch
  let gTouchX = 0;
  gTrack.addEventListener('touchstart', e => { gTouchX = e.touches[0].pageX; gWasDragged = false; }, { passive: true });
  gTrack.addEventListener('touchmove', e => { if (Math.abs(e.touches[0].pageX - gTouchX) > DRAG_THRESH) gWasDragged = true; }, { passive: true });
  gTrack.addEventListener('touchend', () => { setTimeout(() => { gWasDragged = false; }, 20); });

  // Lightbox
  function openLb(i) {
    lbIndex = i;
    const p = galleryPieces[i];
    gLbImg.src = p.img; gLbImg.alt = p.title;
    gLbTitle.textContent = p.title;
    gLbMat.textContent = p.material;
    gLightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    gLightbox.classList.remove('active');
    document.body.style.overflow = '';
    lbIndex = -1;
  }
  function navigateLb(dir) {
    const n = lbIndex + dir;
    if (n >= 0 && n < total) openLb(n);
  }

  document.getElementById('gLbClose').addEventListener('click', closeLb);
  document.getElementById('gLbPrev').addEventListener('click', () => navigateLb(-1));
  document.getElementById('gLbNext').addEventListener('click', () => navigateLb(1));
  gLightbox.addEventListener('click', e => { if (e.target === gLightbox) closeLb(); });

  document.addEventListener('keydown', e => {
    if (!gLightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') navigateLb(-1);
    if (e.key === 'ArrowRight') navigateLb(1);
  });

  gUpdateUI();
}());
</script>

<script src="//cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 40, density: { enable: true, value_area: 900 } },
    color: { value: "#3a3a38" },
    shape: { type: "circle" },
    opacity: { value: 0.6, random: true, anim: { enable: false } },
    size: { value: 2, random: true, anim: { enable: false } },
    line_linked: {
      enable: true,
      distance: 160,
      color: "#3a3a38",
      opacity: 0.35,
      width: 1
    },
    move: {
      enable: true,
      speed: 1.2,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false
    }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: { enable: true, mode: "grab" },
      onclick: { enable: true, mode: "push" },
      resize: true
    },
    modes: {
      grab: { distance: 180, line_linked: { opacity: 0.6 } },
      push: { particles_nb: 3 }
    }
  },
  retina_detect: true
});

/* Forward document-level mouse events to the particles canvas so that
   hover (grab) and click (push) interactions work even though the canvas
   sits behind page content at a lower z-index. dispatchEvent bypasses
   CSS pointer-events / z-index hit-testing. */
(function () {
  var canvas = document.querySelector('#particles-js canvas');
  if (!canvas) return;
  document.addEventListener('mousemove', function (e) {
    canvas.dispatchEvent(new MouseEvent('mousemove', {
      clientX: e.clientX,
      clientY: e.clientY
    }));
  });
  document.addEventListener('click', function (e) {
    canvas.dispatchEvent(new MouseEvent('click', {
      clientX: e.clientX,
      clientY: e.clientY
    }));
  });
  document.documentElement.addEventListener('mouseleave', function () {
    canvas.dispatchEvent(new MouseEvent('mouseleave', {}));
  });
}());
</script>
